---
###########################################################################
# 📊 logrotate Installation und Konfiguration
# Multi-OS | idempotent | AWX-kompatibel
###########################################################################
# Credentials (AWX):
#   allg_status:            aktiviert | deaktiviert | deinstalliert
#   logrotate_frequency:    daily | weekly | monthly
#   logrotate_rotate:       Anzahl rotierter Dateien behalten (z.B. 7)
#   logrotate_compress:     true | false
#   logrotate_maxsize:      Max Dateigroesse (z.B. 100M)
#   logrotate_minsize:      Min Groesse vor Rotation (z.B. 10M)
#   logrotate_dateext:      true | false (Datum im Dateinamen)
#   logrotate_maxage:       Max Alter in Tagen (z.B. 90)
#   ssh_key:                SSH-Zugangsdaten
#
# Beschreibung:
# Installiert und konfiguriert logrotate fuer systemweite Log-Rotation.
# Konfiguriert /etc/logrotate.conf mit den uebergebenen Variablen.
# App-spezifische Configs in /etc/logrotate.d/ bleiben erhalten.
#
# Hinweise:
# - logrotate ist kein Daemon, laeuft ueber cron/systemd-timer
# - /etc/logrotate.conf setzt systemweite Defaults
# - /etc/logrotate.d/ ueberschreibt Defaults pro Anwendung
#
# BEST PRACTICES:
# - Wenn moeglich kein Code im Playbook, sondern in task auslagern
# - Nicht benoetigte Service-Includes loeschen (nicht auskommentieren)
###########################################################################

- name: pb_setup_logrotate.yml
  hosts: all
  become: true
  gather_facts: true

  ###########################################################################
  # Externe Variablen (OS-spezifische Daten)
  ###########################################################################
  vars_files:
    - playbooks_paths.yml

  vars:
    # Hauptanwendung
    var_pack_name:
      - logrotate

    # Abhängigkeiten
    var_dependencies_list:

    # Voraussetzungen
    var_prerequisites:

    # Installationsreihenfolge (0 = erst Hauptanwendung, 1 = erst Dependencies)
    var_inst_order: 0

    # Kein Service-Start (logrotate ist kein Daemon)
    var_sonder_start:
    var_sonder_autostart:

    # Nicht unterstützte OS
    unsupported_systems:

    # Playbook-Kontext
    templates_paths_pb: logrotate
    pb_doku_template: logrotate_doku

  #############################################################################

  pre_tasks:
    ###########################################################################
    # Variablen laden
    ###########################################################################
    - name: Lade alle Variablen-Dateien - pb_inst_conf_logrotate.yml
      ansible.builtin.include_vars:
        file: "{{ item }}"
      loop: "{{ var_files }}"

    ###########################################################################
    # Hook: Pre-Start
    ###########################################################################
    - name: 🔧 Hook Pre-Start - pb_inst_conf_logrotate.yml
      ansible.builtin.include_tasks: "{{ include_paths.hook_pre_start }}"

    ###########################################################################
    # Systemcheck
    ###########################################################################
    - name: 🔄 Systemcheck - pb_inst_conf_logrotate.yml
      ansible.builtin.include_tasks: "{{ include_paths.systemcheck }}"

    - name: 🔄 Systemcheck Prerequisites - pb_inst_conf_logrotate.yml
      ansible.builtin.include_tasks: "{{ include_paths.prereq_check }}"

    ###########################################################################
    # Standard Pre-Tasks
    ###########################################################################
    - name: 🔄 Paketmanager-Lock prüfen - pb_inst_conf_logrotate.yml
      ansible.builtin.include_tasks: "{{ include_paths.check_pkg_lock }}"

    - name: 🔄 Debug Ausgabe Playbook-Start - pb_inst_conf_logrotate.yml
      ansible.builtin.include_tasks: "{{ include_paths.debug_start }}"

  tasks:
    ###########################################################################
    # INSTALLATION
    ###########################################################################
    - block:
        - name: 🔧 Hook Pre-Install - pb_inst_conf_logrotate.yml
          ansible.builtin.include_tasks: "{{ include_paths.hook_pre_install }}"

        - name: Installation logrotate - pb_inst_conf_logrotate.yml
          ansible.builtin.include_tasks: "{{ include_paths.install_allg }}"

        - name: logrotate Konfiguration - pb_inst_conf_logrotate.yml
          ansible.builtin.include_tasks: "{{ task_paths.logrotate_task }}"

      when: allg_status == "aktiviert"

    ###########################################################################
    # DEINSTALLATION
    ###########################################################################
    - block:
        - name: 🔄 Deinstallation logrotate - pb_inst_conf_logrotate.yml
          ansible.builtin.include_tasks: "{{ include_paths.deinstall_allg }}"

      when: allg_status == "deinstalliert"

    ###########################################################################
    # Hook: End
    ###########################################################################
    - name: 🔧 Hook End - pb_inst_conf_logrotate.yml
      ansible.builtin.include_tasks: "{{ include_paths.hook_end_pb }}"
