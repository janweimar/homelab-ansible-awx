---
###########################################################################
# 🕒 Zentrale Cronjob-Verwaltung (Hybrid)
# Multi-OS | idempotent | AWX-kompatibel
###########################################################################
# Keine eigenen Credentials noetig!
# Alle Werte kommen aus default_vars.yml:
#   default_vars.<host>.cronjobs:  Zusaetzliche Cronjobs
#
# Voraussetzungen:
#   smtp_user + smtp_password:  SMTP-Credential fuer Doku-Mail
#
# Beschreibung:
# Hybrid-Ansatz:
#   - Bestehende Crons (alerting, certbot) bleiben in ihren Playbooks
#   - Zusaetzliche Crons werden hier zentral verwaltet
#   - Inventarisierung ALLER aktiven Crons auf dem System
#   - Report mit vollstaendiger Uebersicht per Mail
#
# BEST PRACTICES:
# - Wenn moeglich kein Code im Playbook, sondern in task auslagern
# - Nicht benoetigte Service-Includes loeschen (nicht auskommentieren)
###########################################################################

- name: pb_conf_cronjobs.yml
  hosts: all
  become: true
  gather_facts: true

  ###########################################################################
  # Externe Variablen (OS-spezifische Daten)
  ###########################################################################
  vars_files:
    - playbooks_paths.yml

  vars:
    # Kein Paket noetig
    var_pack_name:

    # Abhängigkeiten
    var_dependencies_list:

    # Voraussetzungen
    var_prerequisites:

    # Installationsreihenfolge
    var_inst_order: 0

    # Kein Service
    var_sonder_start:
    var_sonder_autostart:

    # Nicht unterstützte OS
    unsupported_systems:

    # Playbook-Kontext
    templates_paths_pb: cronjobs
    pb_doku_template: cronjobs_doku

  #############################################################################

  pre_tasks:
    ###########################################################################
    # Variablen laden
    ###########################################################################
    - name: Lade alle Variablen-Dateien - pb_conf_cronjobs.yml
      ansible.builtin.include_vars:
        file: "{{ item }}"
      loop: "{{ var_files }}"

    ###########################################################################
    # Hook: Pre-Start
    ###########################################################################
    - name: 🔧 Hook Pre-Start - pb_conf_cronjobs.yml
      ansible.builtin.include_tasks: "{{ include_paths.hook_pre_start }}"

    ###########################################################################
    # Systemcheck
    ###########################################################################
    - name: 🔄 Systemcheck - pb_conf_cronjobs.yml
      ansible.builtin.include_tasks: "{{ include_paths.systemcheck }}"

    ###########################################################################
    # Standard Pre-Tasks
    ###########################################################################
    - name: 🔄 Debug Ausgabe Playbook-Start - pb_conf_cronjobs.yml
      ansible.builtin.include_tasks: "{{ include_paths.debug_start }}"

  tasks:
    ###########################################################################
    # KONFIGURATION
    ###########################################################################
    - block:
        - name: Cronjob Verwaltung - pb_conf_cronjobs.yml
          ansible.builtin.include_tasks: "{{ task_paths.cronjobs_task }}"

      when: allg_status == "aktiviert"

    ###########################################################################
    # Hook: End
    ###########################################################################
    - name: 🔧 Hook End - pb_conf_cronjobs.yml
      ansible.builtin.include_tasks: "{{ include_paths.hook_end_pb }}"
