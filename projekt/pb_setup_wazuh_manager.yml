---
###########################################################################
# 🔒 Wazuh Stack Installation (Manager + Indexer + Dashboard)
# Multi-OS | AWX-kompatibel
###########################################################################
# Credentials:
#   wazuh_install_mode: -a | -a -o | -u  (Installationsmodus)
#   wazuh_install_ignore_check: true/false (-i)
#   wazuh_install_verbose: true/false (-v)
#   wazuh_install_port: Port fuer Dashboard (leer = 443)
#   wazuh_nginx_integration: true/false (nginx Reverse Proxy)
#   server_ssl: true/false (Let's Encrypt SSL via nginx)
#   nginx_modsecurity: true/false (ModSecurity WAF via nginx)
#   allg_status: aktiviert | deaktiviert (aus 0000_global_status_update)
#
# Beschreibung:
# Installiert den kompletten Wazuh Stack per wazuh-install.sh:
#   - wazuh-manager: SIEM/XDR Hauptdienst
#   - wazuh-indexer: Datenbank (OpenSearch)
#   - wazuh-dashboard: Web-Oberflaeche
# Domain/URL kommen aus os_urls.yml (server_urls.wazuh.*)
#
# Hinweise:
# - Benoetigt mindestens 8 GB RAM, empfohlen 16 GB RAM
# - Ports: 1514/tcp (Agent), 1515/tcp (Registrierung), 55000/tcp (API)
# - Wenn nginx aktiv: Dashboard intern auf Port 5601, nginx auf 80/443
# - wazuh-install.sh startet alle Services selbst
#
# BEST PRACTICES:
# - Wenn moeglich kein Code im Playbook, sondern in pre_task/task auslagern
# - Nicht benoetigte Service-Includes loeschen (nicht auskommentieren)
###########################################################################

- name: pb_setup_wazuh_manager.yml
  hosts: all
  become: true
  gather_facts: true

  ###########################################################################
  # Externe Variablen (OS-spezifische Daten)
  ###########################################################################
  vars_files:
    - playbooks_paths.yml

  vars:
    # wazuh-install.sh installiert alles selbst
    # var_pack_name leer - nur nginx wird ggf. als Dependency installiert
    var_pack_name: []
    var_dependencies_list: []
    var_prerequisites:
    var_inst_order: 0
    var_sonder_start:
    var_sonder_autostart:

    # Nicht unterstuetzte OS
    unsupported_systems:
      - RedHat
      - Suse
      - Archlinux
      - FreeBSD

    # Playbook-Log-Dokumentation
    pb_doku_template: wazuh_manager_doku

  #############################################################################

  pre_tasks:
    ###########################################################################
    # Variablen laden & setzen
    ###########################################################################
    - block:
        - name: Lade alle Variablen-Dateien aus var_list.yml - pb_setup_wazuh_manager.yml
          include_vars:
            file: "{{ item }}"
          loop: "{{ var_files }}"

        - name: Setze server_urls fuer aktuellen Host - pb_setup_wazuh_manager.yml
          ansible.builtin.set_fact:
            server_urls: "{{ urls[ansible_host] }}"

    - name: 🌐 nginx hinzufuegen falls wazuh_nginx_integration aktiv - pb_setup_wazuh_manager.yml
      ansible.builtin.set_fact:
        var_pack_name: "{{ ['nginx'] }}"
        var_dependencies_list: []
      when: wazuh_nginx_integration | default(false) | bool

    ###########################################################################
    # Hook: Pre-Start (nach Variablen-Laden)
    ###########################################################################
    - name: 🔧 Hook Pre-Start - pb_setup_wazuh_manager.yml
      ansible.builtin.include_tasks: "{{ include_paths.hook_pre_start }}"

    ###########################################################################
    # Systemcheck & Prerequisites
    ###########################################################################
    - name: 🔄 Importiere Systemcheck - pb_setup_wazuh_manager.yml
      ansible.builtin.include_tasks: "{{ include_paths.systemcheck }}"

    - name: 🔄 Importiere Systemcheck zwingend benoetigter Komponenten - pb_setup_wazuh_manager.yml
      ansible.builtin.include_tasks: "{{ include_paths.prereq_check }}"

    ###########################################################################
    # Standard Pre-Tasks
    ###########################################################################
    - block:
        - name: 🔄 Importiere Paketmanager-Lock pruefen - pb_setup_wazuh_manager.yml
          ansible.builtin.include_tasks: "{{ include_paths.check_pkg_lock }}"

        - name: 🔄 Importiere Debug ausgabe bei Playbook start - pb_setup_wazuh_manager.yml
          ansible.builtin.include_tasks: "{{ include_paths.debug_start }}"

  tasks:
    ###########################################################################
    # HAUPTLOGIK
    ###########################################################################
    - block:
        ###########################################################################
        # Hook: Pre-Install
        ###########################################################################
        - name: 🔧 Hook Pre-Install - pb_setup_wazuh_manager.yml
          ansible.builtin.include_tasks: "{{ include_paths.hook_pre_install }}"

        ###########################################################################
        # Leere nginx.conf entfernen (verhindert dpkg-Fehler bei Installation)
        ###########################################################################
        - name: Pruefe ob nginx.conf existiert und leer ist - pb_setup_wazuh_manager.yml
          ansible.builtin.stat:
            path: /etc/nginx/nginx.conf
          register: _nginx_conf_stat

        - name: Loesche leere nginx.conf vor Installation - pb_setup_wazuh_manager.yml
          ansible.builtin.file:
            path: /etc/nginx/nginx.conf
            state: absent
          when:
            - _nginx_conf_stat.stat.exists | default(false)
            - _nginx_conf_stat.stat.size == 0

        ###########################################################################
        # Standard-Installation (nginx)
        ###########################################################################
        - name: Komplette installation von var_pack_name und var_dependencies_list - pb_setup_wazuh_manager.yml
          ansible.builtin.include_tasks: "{{ include_paths.install_allg }}"

        ###########################################################################
        # Wazuh Installation + nginx Konfiguration
        ###########################################################################
        - name: Ausfuehren der kompletten Konfiguration - pb_setup_wazuh_manager.yml
          ansible.builtin.include_tasks: "{{ task_paths.wazuh_manager_task }}"

      when: allg_status == "aktiviert"

    ###########################################################################
    # Hook: end
    ###########################################################################
    - name: 🔧 Hook Post-Install - pb_setup_wazuh_manager.yml
      ansible.builtin.include_tasks: "{{ include_paths.hook_end_pb }}"
