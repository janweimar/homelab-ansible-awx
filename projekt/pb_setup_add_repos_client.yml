###########################################################################
# 📦 Repository Konfiguration Client
# Multi-OS | idempotent | AWX-kompatibel
###########################################################################
# Credentials:
#   var_repo_list: Komma-getrennte Liste der Repositories (z.B. "docker,kubernetes")
#   ssh_key: SSH-Zugangsdaten
#
# Beschreibung:
#   - Fügt benötigte Repositories auf Client-Systemen hinzu
#   - Entfernt nicht benötigte Repositories
#   - Aktualisiert Paketmanager-Cache
#
# Hinweise:
#   - Keine Pakete werden installiert, nur Repository-Konfiguration
#   - Repository-Liste muss in os_repo.yml definiert sein
#   - GPG-Keys werden automatisch importiert
#
# BEST PRACTICES:
# - Wenn möglich kein Code im Playbook, sondern in pre_task/task auslagern
# - Nicht benötigte Service-Includes löschen (nicht auskommentieren)
###########################################################################

- name: pb_setup_add_repos_client.yml
  hosts: all
  become: true
  gather_facts: true

  vars:
    # Hauptanwendung(en) - LEER da nur Konfiguration
    var_pack_name:

    # Abhängigkeiten - LEER
    var_dependencies_list:

    # Voraussetzungen - NICHTS zwingend nötig
    var_prerequisites:

    # Installationsreihenfolge
    var_inst_order: 0

    # Zusätzliche Services
    var_sonder_start:
    var_sonder_autostart:

    # Template-Pfade für Playbook
    templates_paths_pb:
    pb_doku_template: add_repo_client
    # Nicht unterstützte OS
    unsupported_systems:

  #############################################################################

  pre_tasks:
    ###########################################################################
    # Variablen laden & setzen
    ###########################################################################
    - block:
        - name: Lade playbooks_paths.yml - pb_setup_add_repos_client.yml
          include_vars:
            file: "playbooks_paths.yml"

        - name: Lade alle Variablen-Dateien aus var_list.yml - pb_setup_add_repos_client.yml
          include_vars:
            file: "{{ item }}"
          loop: "{{ var_files }}"

    ###########################################################################
    # Hook: Pre-Start (nach Variablen-Laden)
    ###########################################################################
    - name: 🔧 Hook Pre-Start - pb_setup_add_repos_client.yml
      ansible.builtin.include_tasks: "{{ include_paths.hook_pre_start }}"

    ###########################################################################
    # Systemcheck & Prerequisites
    ###########################################################################
    - name: 🔄 Importiere Systemcheck - pb_setup_add_repos_client.yml
      ansible.builtin.include_tasks: "{{ include_paths.systemcheck }}"

    - name: 🔄 Importiere Systemcheck zwingend benötigter Komponenten - pb_setup_add_repos_client.yml
      ansible.builtin.include_tasks: "{{ include_paths.prereq_check }}"

    ###########################################################################
    # Standard Pre-Tasks
    ###########################################################################
    - block:
        ###########################################################################
        # Paketmanager-Lock & Debug
        ###########################################################################
        - name: 📄 Importiere Paketmanager-Lock prüfen
          ansible.builtin.include_tasks: "{{ include_paths.check_pkg_lock }}"

        ###########################################################################
        # Debug-Ausgabe
        ###########################################################################
        - name: 📄 Importiere Debug ausgabe bei Playbook start
          ansible.builtin.include_tasks: "{{ include_paths.debug_start }}"

  tasks:
    ###########################################################################
    # HAUPTLOGIK - Konfiguration
    ###########################################################################
    - block:
        ###########################################################################
        # Hook: Pre-Install
        ###########################################################################
        - name: 🔧 Hook Pre-Install - pb_setup_add_repos_client.yml
          ansible.builtin.include_tasks: "{{ include_paths.hook_pre_install }}"

        ###########################################################################
        # Validierung
        ###########################################################################
        - name: 📄 Validiere Repository-Liste
          ansible.builtin.include_tasks: "{{ task_paths.add_repos_client_validate }}"

        ###########################################################################
        # Playbook-spezifische Konfiguration
        ###########################################################################
        - name: 📄 Repo Management (IST vs SOLL)
          ansible.builtin.include_tasks: "{{ task_paths.add_repos_client }}"

        - name: 📄 Repositories aktualisieren
          ansible.builtin.include_tasks: "{{ include_paths.repos_update_aktualisieren }}"
      when: allg_status == "aktiviert"

    ###########################################################################
    # Deaktivierung
    ###########################################################################
    - block:
        ###########################################################################
        # Repos entfernen
        ###########################################################################
        - name: 📄 Entferne Repos
          ansible.builtin.include_tasks: "{{ task_paths.remove_repos }}"

      when: allg_status == "deaktiviert"

    ###########################################################################
    # Hook End
    ###########################################################################
    - name: 📄 Hook End
      ansible.builtin.include_tasks: "{{ include_paths.hook_end_pb }}"
