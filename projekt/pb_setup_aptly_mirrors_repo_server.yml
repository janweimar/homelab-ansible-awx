---
###########################################################################
# 🧱 pb_conf_aptly_mirrors_repo_server.yml
# Aptly Mirror Roll Management
# Multi-OS | idempotent | AWX-kompatibel
###########################################################################
# Unterstützte Systeme: Debian
#
# Credentials:
#   ssh_key_credential – SSH Zugriff auf Repo-Server
#
# Zweck:
#   - Erstellt und aktualisiert Aptly MIRRORS
#   - Verwendet AUSSCHLIESSLICH die Definitionen aus `roll`
#   - Führt `aptly mirror update` aus
#
# NICHT enthalten:
#   ❌ Snapshots (base / freeze)
#   ❌ Freeze-Logik
#   ❌ Publish / Release
#
# Ergebnis:
#   - Mirrors spiegeln den aktuellen Upstream-Stand
#   - Grundlage für separates Publish-/Freeze-Playbook
###########################################################################

- name: pb_conf_aptly_mirrors_repo_server.yml
  hosts: all
  become: true
  gather_facts: true

  vars:
    var_prerequisites:

    unsupported_systems:
      - RedHat
      - Suse
      - Archlinux
      - FreeBSD

    templates_paths_pb: aptly_mirrors
    pb_doku_template: aptly_mirrors

  #############################################################################

  pre_tasks:
    ###########################################################################
    # Variablen laden & setzen
    ###########################################################################
    - block:
        - name: Lade playbooks_paths.yml - pb_conf_aptly_mirrors_repo_server.yml
          include_vars:
            file: "playbooks_paths.yml"

        - name: Lade alle Variablen-Dateien aus var_list.yml - pb_conf_aptly_mirrors_repo_server.yml
          include_vars:
            file: "{{ item }}"
          loop: "{{ var_files }}"

    ###########################################################################
    # Hook: Pre-Start (nach Variablen-Laden)
    ###########################################################################
    - name: 🔧 Hook Pre-Start - pb_conf_aptly_mirrors_repo_server.yml
      ansible.builtin.include_tasks: "{{ include_paths.hook_pre_start }}"

    ###########################################################################
    # Systemcheck & Prerequisites
    ###########################################################################
    - name: 🔄 Importiere Systemcheck - pb_conf_aptly_mirrors_repo_server.yml
      ansible.builtin.include_tasks: "{{ include_paths.systemcheck }}"

    - name: 🔄 Importiere Systemcheck zwingend benötigter Komponenten - pb_conf_aptly_mirrors_repo_server.yml
      ansible.builtin.include_tasks: "{{ include_paths.prereq_check }}"

    ###########################################################################
    # Standard Pre-Tasks
    ###########################################################################
    - block:
        - name: 🔄 Paketmanager-Lock prüfen - pb_conf_aptly_mirrors_repo_server.yml
          ansible.builtin.include_tasks: "{{ include_paths.check_pkg_lock }}"

        - name: 🔄 Debug – Eingangsvariablen - pb_conf_aptly_mirrors_repo_server.yml
          ansible.builtin.include_tasks: "{{ include_paths.debug_start_config }}"

        - name: 🔄 Importiere Playbook Debug - pb_conf_aptly_mirrors_repo_server.yml
          ansible.builtin.include_tasks: "{{ debug_tasks.aptly_mirrors_debug }}"

  tasks:
    ###########################################################################
    # Voraussetzung: install_aptly muss in pb_setup_repo_server aktiviert sein
    ###########################################################################
    - name: ❓ Prüfe ob aptly auf dem Repo-Server aktiviert ist - pb_conf_aptly_mirrors_repo_server.yml
      ansible.builtin.assert:
        that:
          - ansible_local.repo_server.install_aptly | default('False') | bool
        fail_msg: >
          ❌ ABBRUCH: aptly ist auf diesem Server nicht aktiviert!
          Bitte zuerst pb_setup_repo_server.yml mit install_aptly=true ausführen.
        success_msg: "✅ aptly ist aktiviert — fahre fort."

    ###########################################################################
    # HAUPTLOGIK
    ###########################################################################
    - block:
        ###########################################################################
        # Hook: Pre-Install
        ###########################################################################
        - name: 🔧 Hook Pre-Install - pb_conf_aptly_mirrors_repo_server.yml
          ansible.builtin.include_tasks: "{{ include_paths.hook_pre_install }}"

        ###########################################################################
        # Playbook-spezifische Konfiguration
        ###########################################################################
        - name: 🔄 Importiere Konfigurations-Tasks - pb_conf_aptly_mirrors_repo_server.yml
          ansible.builtin.include_tasks: "{{ task_paths.conf_aptly_mirror_server_task }}"

      when: allg_status == "aktiviert"

    ###########################################################################
    # Hook: end
    ###########################################################################
    - name: 🔧 Hook Post-Install - pb_conf_aptly_mirrors_repo_server.yml
      ansible.builtin.include_tasks: "{{ include_paths.hook_end_pb }}"
