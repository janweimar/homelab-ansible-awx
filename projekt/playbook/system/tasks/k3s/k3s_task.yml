---
#####################################################################
# 🧊 k3s_task.yml
# K3s Installation und Cluster-Konfiguration (VERSIONIERT)
#####################################################################
# Alle Versionen kommen aus kube_stack_versionen.yml:
#   k3s_stack: "{{ k3s_versionen[k3s_stack_auswahl] }}"
#
# Keine hardcodierten Versionen oder "latest" Downloads!
# K3s wird über INSTALL_K3S_VERSION gepinnt.
#####################################################################

# ============================================================
# kube User sicherstellen
# ============================================================
- name: 🔍 Prüfe ob kube User existiert - k3s_task.yml
  ansible.builtin.command: id {{ kube_user }}
  register: _kube_user_check
  failed_when: false
  changed_when: false

- name: 👤 Erstelle kube User - k3s_task.yml
  ansible.builtin.user:
    name: "{{ kube_user }}"
    shell: /bin/bash
    create_home: true
    system: false
  when: _kube_user_check.rc != 0

- name: 📊 DEBUG kube User - k3s_task.yml
  ansible.builtin.debug:
    msg: "👤 kube_user: {{ kube_user }} ({{ 'existiert bereits' if _kube_user_check.rc == 0 else 'neu erstellt' }})"

- name: 📦 ACL Paket installieren (für become_user) - k3s_task.yml
  ansible.builtin.apt:
    name: acl
    state: present
    update_cache: false

# ============================================================
# Stack-Variablen laden
# ============================================================
- name: 📦 Lade K3s Stack-Konfiguration - k3s_task.yml
  ansible.builtin.set_fact:
    k3s_stack: "{{ k3s_versionen[k3s_stack_auswahl] }}"

- name: 📦 Debug Stack-Auswahl - k3s_task.yml
  ansible.builtin.debug:
    msg:
      - "Stack: {{ k3s_stack_auswahl }}"
      - "K3s: {{ k3s_stack.k3s_version }}"
      - "Kubernetes: v{{ k3s_stack.kubernetes_version }}"
      - "Containerd: {{ k3s_stack.containerd }}"
      - "Flannel: {{ k3s_stack.flannel }}"
      - "Deaktiviert: {{ k3s_stack.disable | join(', ') }}"

# ============================================================
# K3s installieren (versioniert!)
# ============================================================
- name: 🔍 Prüfe ob K3s bereits läuft - k3s_task.yml
  ansible.builtin.command: systemctl is-active k3s
  register: k3s_running
  failed_when: false
  changed_when: false

- name: 🔍 Prüfe installierte K3s Version - k3s_task.yml
  ansible.builtin.command: k3s --version
  register: k3s_current_version
  failed_when: false
  changed_when: false

- name: 📥 Installiere K3s {{ k3s_stack.k3s_version }} - k3s_task.yml
  ansible.builtin.shell: >
    curl -sfL https://get.k3s.io | sh -s - server
    {% for item in k3s_stack.disable %}
    --disable {{ item }}
    {% endfor %}
    {{ k3s_stack.extra_args }}
  environment:
    INSTALL_K3S_VERSION: "{{ k3s_stack.k3s_version }}"
  register: k3s_install
  changed_when: true
  when: >
    k3s_running.stdout | default('') != 'active' or
    k3s_stack.k3s_version not in (k3s_current_version.stdout | default(''))

- name: ▶️ Ensure K3s is running - k3s_task.yml
  ansible.builtin.service:
    name: k3s
    state: started
    enabled: true

# ============================================================
# Warte auf API-Server
# ============================================================
- name: ⏳ Warte auf K3s API-Server - k3s_task.yml
  ansible.builtin.command: >
    k3s kubectl get --raw='/healthz'
  register: k3s_health
  retries: 30
  delay: 5
  until: k3s_health.rc == 0
  changed_when: false

# ============================================================
# kubectl einrichten für kube User
# ============================================================
- name: 📂 Ensure .kube directory exists - k3s_task.yml
  ansible.builtin.file:
    path: "/home/{{ kube_user }}/.kube"
    state: directory
    owner: "{{ kube_user }}"
    group: "{{ kube_user }}"
    mode: '0700'

- name: 🔧 Kopiere kubeconfig für kube User - k3s_task.yml
  ansible.builtin.copy:
    src: /etc/rancher/k3s/k3s.yaml
    dest: "/home/{{ kube_user }}/.kube/config"
    owner: "{{ kube_user }}"
    group: "{{ kube_user }}"
    mode: '0600'
    remote_src: true

- name: 🔗 Erstelle kubectl Symlink - k3s_task.yml
  ansible.builtin.file:
    src: /usr/local/bin/k3s
    dest: /usr/local/bin/kubectl
    state: link
    force: true

# ============================================================
# Helm installieren
# ============================================================
- name: 🔍 Prüfe ob Helm installiert ist - k3s_task.yml
  ansible.builtin.command: helm version --short
  register: helm_check
  failed_when: false
  changed_when: false

- name: 📥 Installiere Helm - k3s_task.yml
  ansible.builtin.shell: >
    curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
  when: helm_check.rc != 0

# ============================================================
# StorageClass prüfen
# ============================================================
- name: 🔍 Prüfe StorageClass - k3s_task.yml
  ansible.builtin.command: kubectl get storageclass
  become_user: "{{ kube_user }}"
  register: sc_check
  changed_when: false
  failed_when: false

# ============================================================
# Cluster-Status prüfen
# ============================================================
- name: ⏳ Warte bis Node Ready ist - k3s_task.yml
  ansible.builtin.command: kubectl get nodes --no-headers
  become_user: "{{ kube_user }}"
  register: node_status
  retries: 30
  delay: 10
  until: "' Ready ' in node_status.stdout"
  changed_when: false

- name: ⏳ Warte bis alle System-Pods Ready sind - k3s_task.yml
  ansible.builtin.command: >
    kubectl wait --for=condition=Ready pod --all
    -n kube-system --timeout=300s
  become_user: "{{ kube_user }}"
  changed_when: false
  failed_when: false

- name: 🧪 K3s Version - k3s_task.yml
  ansible.builtin.command: k3s --version
  register: k3s_version_final
  changed_when: false

- name: 🧪 Node Status - k3s_task.yml
  ansible.builtin.command: kubectl get nodes -o wide
  become_user: "{{ kube_user }}"
  register: final_node_status
  changed_when: false

- name: 🧪 Alle Pods - k3s_task.yml
  ansible.builtin.command: kubectl get pods --all-namespaces
  become_user: "{{ kube_user }}"
  register: pods_status
  changed_when: false

- name: 📊 Debug – K3s Status Übersicht - k3s_task.yml
  ansible.builtin.debug:
    msg:
      - "=========================================="
      - "🧊 K3s Cluster Status"
      - "=========================================="
      - "{{ k3s_version_final.stdout }}"
      - "Soll: {{ k3s_stack.k3s_version }}"
      - ""
      - "🧠 Node-Status:"
      - "{{ final_node_status.stdout_lines }}"
      - ""
      - "📦 StorageClass:"
      - "{{ sc_check.stdout_lines }}"
      - ""
      - "📦 Pods:"
      - "{{ pods_status.stdout_lines }}"
      - "=========================================="
      - "✅ K3s Cluster bereit!"
      - "  kubectl: sudo -u {{ kube_user }} kubectl get pods --all-namespaces"
      - "  helm:    sudo -u {{ kube_user }} helm list --all-namespaces"
      - "  config:  /etc/rancher/k3s/k3s.yaml"
      - "=========================================="
