---
###########################################################################
# ⏸️ mariadb_webui_stop.yml
# MariaDB Code-Wissensdatenbank + Adminer stoppen
###########################################################################

- name: ⏸️ MariaDB + Adminer Pods skalieren auf 0 - mariadb_webui_stop.yml
  ansible.builtin.command: kubectl scale deployment --all --replicas=0 -n {{ app_name }}
  become_user: "{{ kube_user }}"
  environment:
    HOME: "/home/{{ kube_user }}"
    KUBECONFIG: "/home/{{ kube_user }}/.kube/config"
  changed_when: true
  failed_when: false
  when: app_deploy_type | default('docker') in ['minikube', 'k3s', 'k8s']

- name: 📊 DEBUG Stop abgeschlossen - mariadb_webui_stop.yml
  ansible.builtin.debug:
    msg: "⏸️ {{ app_name }} gestoppt ({{ app_deploy_type | default('docker') }})"
