---
###########################################################################
# ⏸️ qdrant_stop.yml
# Qdrant Pods stoppen (Kubernetes + Docker)
###########################################################################

- name: ⏸️ Qdrant Kubernetes Pods skalieren auf 0 - qdrant_stop.yml
  ansible.builtin.command: kubectl scale deployment --all --replicas=0 -n {{ app_name }}
  become_user: "{{ kube_user }}"
  environment:
    HOME: "/home/{{ kube_user }}"
    KUBECONFIG: "/home/{{ kube_user }}/.kube/config"
  changed_when: true
  failed_when: false
  when: app_deploy_type | default('docker') in ['minikube', 'k3s', 'k8s']

- name: ⏸️ Qdrant Docker Container stoppen - qdrant_stop.yml
  ansible.builtin.command:
    cmd: docker compose stop
    chdir: /opt/{{ app_name }}
  changed_when: true
  failed_when: false
  when: app_deploy_type | default('docker') == 'docker'

- name: 📊 DEBUG Stop abgeschlossen - qdrant_stop.yml
  ansible.builtin.debug:
    msg: "⏸️ {{ app_name }} gestoppt ({{ app_deploy_type | default('docker') }})"
