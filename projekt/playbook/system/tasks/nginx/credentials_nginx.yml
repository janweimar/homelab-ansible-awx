###########################################################################
# 🔧 NGINX CREDENTIAL TYPES - Dokumentation
###########################################################################

# ========================================
# credential_type_nginx_general
# Allgemeine Nginx-Konfiguration
# ========================================
# Beschreibung:
#   Steuert welche Nginx-Features aktiviert werden und grundlegende
#   Einstellungen für den Webserver
#
# Verwendung:
#   - nginx_port_80: Aktiviert HTTP auf Port 80
#   - nginx_port_443: Aktiviert HTTPS auf Port 443
#   - nginx_ssl_create: Erstellt automatisch Let's Encrypt Zertifikate
#   - nginx_modsecurity: Aktiviert ModSecurity Web Application Firewall
#   - nginx_redirect_http_to_https: Leitet HTTP automatisch zu HTTPS um
#   - admin_email: E-Mail für Let's Encrypt Benachrichtigungen
#
# Hinweise:
#   - Mindestens nginx_port_80 ODER nginx_port_443 muss true sein
#   - nginx_ssl_create benötigt nginx_port_443=true
#   - nginx_redirect_http_to_https benötigt beide Ports aktiviert
###########################################################################
fields:
  - id: nginx_port_80
    type: boolean
    label: HTTP Port 80 aktivieren
    help_text: Aktiviert Reverse Proxy auf Port 80 (unverschlüsselt)

  - id: nginx_port_443
    type: boolean
    label: HTTPS Port 443 aktivieren
    help_text: Aktiviert Reverse Proxy auf Port 443 (SSL/TLS verschlüsselt)

  - id: nginx_ssl_create
    type: boolean
    label: Let's Encrypt Zertifikate erstellen
    help_text: Erstellt automatisch SSL-Zertifikate via Let's Encrypt (benötigt Port 80 für Validierung)

  - id: nginx_modsecurity
    type: boolean
    label: ModSecurity aktivieren
    help_text: Aktiviert ModSecurity Web Application Firewall mit OWASP Core Rule Set

  - id: nginx_redirect_http_to_https
    type: boolean
    label: HTTP zu HTTPS umleiten
    help_text: Leitet alle HTTP-Anfragen automatisch auf HTTPS um (301 Redirect)

  - id: admin_email
    type: string
    label: Admin E-Mail
    secret: false
    help_text: E-Mail-Adresse für Let's Encrypt Benachrichtigungen und Zertifikatsverlängerungen

required:
  - nginx_port_80
  - nginx_port_443
  - admin_email

  # ========================================
  # credential_type_nginx_domains
  # Domain-Routing Konfiguration
  # ========================================
  # Beschreibung:
  #   Definiert welche Domains/Subdomains zu welchen Backend-Ports
  #   weitergeleitet werden (Reverse Proxy Routing)
  #
  # Format HTTP (domain_port):
  #   domain/port              → domain.de leitet zu localhost:port
  #   domain/ip/port           → domain.de leitet zu ip:port
  #   Mehrere: domain1/port1,domain2/ip2/port2
  #
  # Format HTTPS (domain_port_ssl):
  #   Identisch zu domain_port
  #   Falls leer: verwendet domain_port auch für HTTPS
  #
  # Beispiele:
  #   HTTP:  awx.example.de/30080,api.example.de/192.168.1.10/8080
  #   HTTPS: awx.example.de/30443,api.example.de/192.168.1.10/8443
  #
  # Hinweise:
  #   - Keine Leerzeichen zwischen Einträgen
  #   - Port muss immer angegeben werden
  #   - IP ist optional (Standard: localhost/127.0.0.1)
  ###########################################################################
  #fields:
  - id: domain_port
    type: string
    label: HTTP Domains
    secret: false
    help_text: >-
      Kommagetrennte Liste: domain/port oder domain/ip/port
      Beispiel: awx.example.de/30080,api.example.de/192.168.1.10/8080

  - id: domain_port_ssl
    type: string
    label: HTTPS Domains
    secret: false
    help_text: >-
      Kommagetrennte Liste für HTTPS. Falls leer wird domain_port verwendet.
      Beispiel: awx.example.de/30443,api.example.de/192.168.1.10/8443

  # ========================================
  # credential_type_nginx_modsecurity
  # ModSecurity WAF Konfiguration
  # ========================================
  # Beschreibung:
  #   Detaillierte Konfiguration für ModSecurity Web Application Firewall
  #   Wird nur verwendet wenn nginx_modsecurity=true
  #
  # Modi (modsec_rule_engine):
  #   - DetectionOnly: Loggt Angriffe, blockiert NICHT (zum Testen)
  #   - On: Loggt UND blockiert Angriffe (Produktiv)
  #   - Off: ModSecurity komplett deaktiviert
  #
  # Empfohlene Werte Produktion:
  #   modsec_rule_engine: On
  #   modsec_log_dir: /var/log/nginx
  #   modsec_data_dir: /var/lib/modsecurity
  #   modsec_tmp_dir: /tmp
  #   modsec_debug_level: 0
  #   modsec_request_limit: 13107200 (12.5 MB)
  #   modsec_response_body_access: On
  #
  # Hinweise:
  #   - DetectionOnly zum Testen empfohlen (verhindert False-Positives)
  #   - Debug Level 0-9 (0=keine Debug-Logs, 9=sehr ausführlich)
  #   - Request Limit in Bytes (13107200 = ~12.5 MB für File-Uploads)
  ###########################################################################
  #fields:
  - id: modsec_rule_engine
    type: string
    label: ModSecurity Mode
    secret: false
    help_text: "DetectionOnly (nur loggen) | On (blocken) | Off (deaktiviert)"

  - id: modsec_log_dir
    type: string
    label: Log Directory
    secret: false
    help_text: Verzeichnis für ModSecurity Logs (Standard /var/log/nginx)

  - id: modsec_data_dir
    type: string
    label: Data Directory
    secret: false
    help_text: Verzeichnis für persistente ModSecurity-Daten (Standard /var/lib/modsecurity)

  - id: modsec_tmp_dir
    type: string
    label: Temp Directory
    secret: false
    help_text: Verzeichnis für temporäre Dateien (Standard /tmp)

  - id: modsec_debug_level
    type: string
    label: Debug Level (0-9)
    secret: false
    help_text: "Log-Level: 0=keine Debug-Logs, 9=sehr ausführlich (Standard: 0)"

  - id: modsec_request_limit
    type: string
    label: Request Body Limit (Bytes)
    secret: false
    help_text: Maximale Upload-Größe in Bytes (Standard 13107200 = 12.5 MB)

  - id: modsec_response_body_access
    type: string
    label: Response Body Access
    secret: false
    help_text: "On: Response-Body scannen | Off: nur Request scannen (Standard: On)"

  #required:
  - modsec_rule_engine
  - modsec_log_dir
  - modsec_data_dir
