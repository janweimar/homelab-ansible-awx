---
# ============================================================
# WIREGUARD CLIENT - TASK
# ============================================================
# Konfiguriert WireGuard Client lokal
# Private Key: wg_private_key (AWX Credential)
# Server Public Key: vpn_server_public_key (vpn.yml)
# Kein delegate_to / Cross-Server SSH nötig!
# ============================================================

# --------------------------------------------------------
# Client-Identifikation
# --------------------------------------------------------
- name: WG Client – Ermittle meinen Client-Eintrag aus vpn_clients - wireguard_client_task.yml
  ansible.builtin.set_fact:
    my_vpn_config: >-
      {{
        vpn_clients |
        selectattr('ansible_host', 'equalto', ansible_default_ipv4.address) |
        first |
        default(None)
      }}

- name: WG Client – Fehler wenn nicht in Client-Liste - wireguard_client_task.yml
  ansible.builtin.fail:
    msg: |
      ❌ Dieser Server ({{ ansible_default_ipv4.address }}) ist nicht in der VPN Client-Liste!

      Füge in vpn.yml unter vpn_clients hinzu:
        - name: "{{ inventory_hostname }}"
          ansible_host: "{{ ansible_default_ipv4.address }}"
          vpn_ip: "10.200.0.XX"
          public_key: "DEIN_PUBLIC_KEY"
  when: my_vpn_config is none or my_vpn_config == ""

# --------------------------------------------------------
# WireGuard Verzeichnis erstellen
# --------------------------------------------------------
- name: WG Client – /etc/wireguard erstellen - wireguard_client_task.yml
  ansible.builtin.file:
    path: /etc/wireguard
    state: directory
    owner: root
    group: root
    mode: "0700"

# --------------------------------------------------------
# Client Config lokal aus Template erstellen
# --------------------------------------------------------
- name: WG Client – wg0.conf erstellen - wireguard_client_task.yml
  ansible.builtin.template:
    src: templates/wg0-client.conf.j2
    dest: /etc/wireguard/wg0.conf
    owner: root
    group: root
    mode: "0600"
  vars:
    client: "{{ my_vpn_config }}"
    client_private_key: "{{ wg_private_key }}"
    server_public_key: "{{ vpn_server_public_key }}"
  register: wg_client_conf_result

- name: WG Client – WireGuard neustarten (bei Änderung) - wireguard_client_task.yml
  ansible.builtin.shell: "{{ services.wireguard.restart[ansible_os_family] }}"
  when: wg_client_conf_result.changed | default(false)

# --------------------------------------------------------
# DNS Konfiguration (optional)
# --------------------------------------------------------
- name: WG Client – Prüfe ob resolvconf installiert ist - wireguard_client_task.yml
  ansible.builtin.command: which resolvconf
  register: resolvconf_check
  failed_when: false
  changed_when: false

- name: WG Client – Info wenn resolvconf fehlt - wireguard_client_task.yml
  ansible.builtin.debug:
    msg: "⚠️  resolvconf nicht installiert - DNS wird NICHT über VPN geroutet"
  when: resolvconf_check.rc != 0


