---
###########################################################################
# 🗑️ open-webui_deinstall.yml
# Open WebUI vollständig deinstalliert (Kubernetes + Docker + nginx)
###########################################################################

# ============================================================
# Kubernetes-Modus (K3s/Minikube)
# ============================================================
- block:
    - name: 🗑️ Alle Open WebUI Ressourcen löschen - open-webui_deinstall.yml
      ansible.builtin.command: kubectl delete all --all -n {{ app_name }}
      become_user: "{{ kube_user }}"
      environment:
        HOME: "/home/{{ kube_user }}"
        KUBECONFIG: "/home/{{ kube_user }}/.kube/config"
      failed_when: false
      changed_when: true

    - name: 🗑️ PVCs löschen - open-webui_deinstall.yml
      ansible.builtin.command: kubectl delete pvc --all -n {{ app_name }}
      become_user: "{{ kube_user }}"
      environment:
        HOME: "/home/{{ kube_user }}"
        KUBECONFIG: "/home/{{ kube_user }}/.kube/config"
      failed_when: false
      changed_when: true

    - name: 🗑️ Secrets löschen - open-webui_deinstall.yml
      ansible.builtin.command: kubectl delete secrets --all -n {{ app_name }}
      become_user: "{{ kube_user }}"
      environment:
        HOME: "/home/{{ kube_user }}"
        KUBECONFIG: "/home/{{ kube_user }}/.kube/config"
      failed_when: false
      changed_when: true

    - name: 🗑️ Namespace löschen - open-webui_deinstall.yml
      ansible.builtin.command: kubectl delete namespace {{ app_name }}
      become_user: "{{ kube_user }}"
      environment:
        HOME: "/home/{{ kube_user }}"
        KUBECONFIG: "/home/{{ kube_user }}/.kube/config"
      failed_when: false
      changed_when: true

    - name: 🗑️ Manifest-Datei entfernen - open-webui_deinstall.yml
      ansible.builtin.file:
        path: "/home/{{ kube_user }}/manifests/{{ app_name }}_app.yaml"
        state: absent

  when: app_deploy_type | default('docker') in ['minikube', 'k3s', 'k8s']

# ============================================================
# Docker-Modus
# ============================================================
- block:
    - name: 🗑️ Container und Volumes entfernen - open-webui_deinstall.yml
      ansible.builtin.command:
        cmd: docker compose down -v
        chdir: /opt/{{ app_name }}
      changed_when: true
      failed_when: false

    - name: 🗑️ Verzeichnis entfernen - open-webui_deinstall.yml
      ansible.builtin.file:
        path: /opt/{{ app_name }}
        state: absent

  when: app_deploy_type | default('docker') == 'docker'

# ============================================================
# nginx vHost entfernen (Domain + VPN)
# ============================================================
- name: 🗑️ Entferne nginx Domain vHost - open-webui_deinstall.yml
  ansible.builtin.file:
    path: "{{ paths.nginx_sites_enabled[ansible_os_family] }}/{{ urls[ansible_host][_app_base_name | default(app_name)].domain | default('') }}.conf"
    state: absent
  failed_when: false
  when: urls[ansible_host][_app_base_name | default(app_name)].domain | default('') | length > 0

- name: 🗑️ Entferne nginx VPN vHost - open-webui_deinstall.yml
  ansible.builtin.file:
    path: "{{ paths.nginx_sites_enabled[ansible_os_family] }}/{{ app_name }}_vpn.conf"
    state: absent
  failed_when: false

- name: 🔄 Restart nginx - open-webui_deinstall.yml
  ansible.builtin.command: "{{ command.nginx_restart[ansible_os_family] }}"
  failed_when: false

- name: 📊 DEBUG Deinstallation abgeschlossen - open-webui_deinstall.yml
  ansible.builtin.debug:
    msg: "🗑️ {{ app_name }} vollständig deinstalliert ({{ app_deploy_type | default('docker') }})"
