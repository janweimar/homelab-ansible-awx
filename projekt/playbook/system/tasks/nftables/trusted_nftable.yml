            | union((failsafe_ips.get('for', {}).get('global', {}).get('ipv6') | default([], true)))
            | union((failsafe_ips.get('for', {}).get('vpn', {}).get('ipv6') | default([], true)) if (fire_vpn_enabled | default(false) | bool) else [])
