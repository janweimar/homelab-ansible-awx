###########################################################################
# 🧠 NAT / Masquerade vorbereiten
###########################################################################
- block:
    - name: 🧠 NAT Masquerade-Regeln aus failsafe_ips.yml
      ansible.builtin.set_fact:
        nat_masquerade_rules: >-
          {{ []
            | union((failsafe_ips.get('nat', {}).get('masquerade') | default([], true)) if (fire_vpn_enabled | default(false) | bool) else [])
            | flatten
            | unique
            | list }}

    - name: 🪵 Debug NAT Masquerade
      ansible.builtin.debug:
        msg:
          - "NAT Masquerade Regeln: {{ nat_masquerade_rules }}"

  when: fire_status | default("")  == "aktiviert"

###########################################################################
# 🧠 ignore IP's vorbereiten fail2ban
###########################################################################
- block:
    - name: 🧠 Ignore IPv4-IPs aus failsafe_ips.yml Fail2ban
      ansible.builtin.set_fact:
        ignore_ips_v4: >-
          {{ []
            | union((failsafe_ips.get('f2b', {}).get('ignore', {}).get('ipv4') | default([], true)))
            | union(([awx_ip.content] if (awx_ip is defined and (awx_ip.content | default('') | length > 0)) else []))
            | union((failsafe_ips.get('f2b', {}).get('vpn', {}).get('ipv4') | default([], true)) if (fire_vpn_enabled | default(false) | bool) else [])
            | flatten
            | unique
            | list }}

    - name: 🧠 Ignore IPv6-IPs aus failsafe_ips.yml Fail2ban
      ansible.builtin.set_fact:
        ignore_ips_v6: >-
          {{ []
            | union((failsafe_ips.get('f2b', {}).get('ignore', {}).get('ipv6') | default([], true)))
            | flatten
            | unique
            | list }}

    - name: 🔍 Debug kombinierte Ignore-IPs
      debug:
        msg:
          - "IPv4 Ignore: {{ ignore_ips_v4 | join(' ') }}"
          - "IPv6 Ignore: {{ ignore_ips_v6 | join(' ') }}"

  when: allg_status | default("")  == "aktiviert"
##########################################################################
# 🧪 Debug-Ausgabe: Whitelist aus failsafe_ips.yml + AWX-IP
##########################################################################
