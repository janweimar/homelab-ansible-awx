---
###########################################################################
# 🗄️ db_mysql.yml
# MySQL Deployment — Kubernetes / Docker / Podman / Nativ
###########################################################################
# Benötigte Variablen:
#   app_name:         Name der App (= Namespace/Container-Prefix)
#   app_db_password:  Datenbank Passwort
#   app_deploy_type:  minikube | k3s | k8s | docker | podman | nativ
#   kube_user:        Linux-User für kubectl (nur bei Kubernetes)
#
# Aufruf: Wird von db_deploy.yml inkludiert
###########################################################################

# ============================================================
# KUBERNETES (minikube / k3s / k8s)
# ============================================================
- block:
    - name: 📁 Namespace {{ app_name }} erstellen - db_mysql.yml
      ansible.builtin.command: kubectl create namespace {{ app_name }}
      become_user: "{{ kube_user }}"
      environment:
        HOME: "/home/{{ kube_user }}"
        KUBECONFIG: "/home/{{ kube_user }}/.kube/config"
      register: _ns_create
      failed_when:
        - _ns_create.rc != 0
        - "'already exists' not in _ns_create.stderr"
      changed_when: "'created' in _ns_create.stdout"

    - name: 📁 Manifests-Verzeichnis sicherstellen - db_mysql.yml
      ansible.builtin.file:
        path: "/home/{{ kube_user }}/manifests"
        state: directory
        owner: "{{ kube_user }}"
        group: "{{ kube_user }}"
        mode: "0755"

    - name: 📝 MySQL Manifest erstellen - db_mysql.yml
      ansible.builtin.template:
        src: playbook/system/tasks/common/templates/kube_db_mysql.yml.j2
        dest: "/home/{{ kube_user }}/manifests/{{ app_name }}_db.yaml"
        owner: "{{ kube_user }}"
        group: "{{ kube_user }}"
        mode: "0644"

    - name: 🚀 MySQL deployen - db_mysql.yml
      ansible.builtin.command: kubectl apply -f /home/{{ kube_user }}/manifests/{{ app_name }}_db.yaml
      become_user: "{{ kube_user }}"
      environment:
        HOME: "/home/{{ kube_user }}"
        KUBECONFIG: "/home/{{ kube_user }}/.kube/config"
      register: _db_deploy
      changed_when: "'created' in _db_deploy.stdout or 'configured' in _db_deploy.stdout"

    - name: ⏳ Warte auf MySQL (1/1 Ready) - db_mysql.yml
      ansible.builtin.shell: |
        echo "=== $(date '+%H:%M:%S') === MySQL Status ==="
        kubectl get pods -n {{ app_name }} -l app={{ app_name }}-mysql -o wide 2>/dev/null || echo "Noch kein Pod"
        READY=$(kubectl get pods -n {{ app_name }} -l app={{ app_name }}-mysql --no-headers 2>/dev/null | awk '{print $2}' | grep -c '1/1' || true)
        RESTARTS=$(kubectl get pods -n {{ app_name }} -l app={{ app_name }}-mysql --no-headers 2>/dev/null | awk '{print $4}' || echo "?")
        echo "Ready: $READY | Restarts: $RESTARTS"
        [ "$READY" -ge 1 ] && exit 0 || exit 1
      become_user: "{{ kube_user }}"
      environment:
        HOME: "/home/{{ kube_user }}"
        KUBECONFIG: "/home/{{ kube_user }}/.kube/config"
      register: _db_wait
      until: _db_wait.rc == 0
      retries: 40
      delay: 15
      changed_when: false
      failed_when: false

    - name: "{{ '✅ MySQL ist Ready!' if _db_wait.rc | default(1) == 0 else '⚠️ MySQL nicht Ready!' }}"
      ansible.builtin.debug:
        msg: "{{ '✅ MySQL läuft!' if _db_wait.rc | default(1) == 0 else '⚠️ MySQL nicht bereit — bitte prüfen!' }}"

  when: app_deploy_type in ['minikube', 'k3s', 'k8s']

# ============================================================
# DOCKER
# ============================================================
- block:
    - name: 📁 Docker-Verzeichnis erstellen - db_mysql.yml
      ansible.builtin.file:
        path: "/opt/{{ app_name }}/db"
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: 📝 Docker-Compose erstellen - db_mysql.yml
      ansible.builtin.template:
        src: playbook/system/tasks/common/templates/docker_db_mysql.yml.j2
        dest: "/opt/{{ app_name }}/db/docker-compose.yml"
        owner: root
        group: root
        mode: "0600"

    - name: 🔄 Docker Autostart sicherstellen (Reboot-Sicherheit) - db_mysql.yml
      ansible.builtin.systemd:
        name: docker
        enabled: true

    - name: 🚀 MySQL starten (Docker) - db_mysql.yml
      ansible.builtin.command: docker compose up -d
      args:
        chdir: "/opt/{{ app_name }}/db"
      register: _docker_up
      changed_when: "'Started' in _docker_up.stderr or 'Created' in _docker_up.stderr"

    - name: ⏳ Warte auf MySQL (Docker) - db_mysql.yml
      ansible.builtin.command: docker exec {{ app_name }}-db mysqladmin ping -h localhost -u root -p{{ app_db_password }}
      register: _docker_wait
      until: _docker_wait.rc == 0
      retries: 30
      delay: 10
      changed_when: false
      failed_when: false

    - name: "{{ '✅ MySQL (Docker) ist Ready!' if _docker_wait.rc | default(1) == 0 else '⚠️ MySQL (Docker) nicht Ready!' }}"
      ansible.builtin.debug:
        msg: "{{ '✅ MySQL läuft!' if _docker_wait.rc | default(1) == 0 else '⚠️ MySQL nicht bereit — bitte prüfen!' }}"

  when: app_deploy_type == 'docker'

# ============================================================
# PODMAN
# ============================================================
- block:
    - name: 📁 Podman-Verzeichnis erstellen - db_mysql.yml
      ansible.builtin.file:
        path: "/opt/{{ app_name }}/db"
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: 📝 Podman-Compose erstellen - db_mysql.yml
      ansible.builtin.template:
        src: playbook/system/tasks/common/templates/docker_db_mysql.yml.j2
        dest: "/opt/{{ app_name }}/db/docker-compose.yml"
        owner: root
        group: root
        mode: "0600"

    - name: 🚀 MySQL starten (Podman) - db_mysql.yml
      ansible.builtin.command: podman-compose up -d
      args:
        chdir: "/opt/{{ app_name }}/db"
      register: _podman_up
      changed_when: true

    - name: 📝 Systemd Service erstellen (Reboot-Sicherheit) - db_mysql.yml
      ansible.builtin.copy:
        dest: /etc/systemd/system/{{ app_name }}-db.service
        content: |
          [Unit]
          Description={{ app_name }} MySQL (Podman)
          After=network-online.target
          Wants=network-online.target

          [Service]
          Type=oneshot
          RemainAfterExit=yes
          WorkingDirectory=/opt/{{ app_name }}/db
          ExecStart=/usr/bin/podman-compose up -d
          ExecStop=/usr/bin/podman-compose down

          [Install]
          WantedBy=multi-user.target
        owner: root
        group: root
        mode: "0644"

    - name: 🔄 Systemd Service aktivieren (Reboot-Sicherheit) - db_mysql.yml
      ansible.builtin.systemd:
        name: "{{ app_name }}-db"
        enabled: true
        daemon_reload: true

    - name: ⏳ Warte auf MySQL (Podman) - db_mysql.yml
      ansible.builtin.command: podman exec {{ app_name }}-db mysqladmin ping -h localhost -u root -p{{ app_db_password }}
      register: _podman_wait
      until: _podman_wait.rc == 0
      retries: 30
      delay: 10
      changed_when: false
      failed_when: false

    - name: "{{ '✅ MySQL (Podman) ist Ready!' if _podman_wait.rc | default(1) == 0 else '⚠️ MySQL (Podman) nicht Ready!' }}"
      ansible.builtin.debug:
        msg: "{{ '✅ MySQL läuft!' if _podman_wait.rc | default(1) == 0 else '⚠️ MySQL nicht bereit — bitte prüfen!' }}"

  when: app_deploy_type == 'podman'

# ============================================================
# NATIV (apt install)
# ============================================================
- block:
    - name: 📦 MySQL installieren - db_mysql.yml
      ansible.builtin.apt:
        name:
          - mysql-server
          - mysql-client
        state: present
        update_cache: true

    - name: 🔄 MySQL aktivieren und starten - db_mysql.yml
      ansible.builtin.systemd:
        name: mysql
        state: started
        enabled: true
        daemon_reload: true

    - name: ⏳ Warte auf MySQL (Nativ) - db_mysql.yml
      ansible.builtin.command: mysqladmin ping -h localhost -u root
      register: _nativ_wait
      until: _nativ_wait.rc == 0
      retries: 15
      delay: 5
      changed_when: false

    - name: 🗄️ Datenbank erstellen - db_mysql.yml
      ansible.builtin.command: >
        mysql -u root -e
        "CREATE DATABASE IF NOT EXISTS \`{{ app_name }}\`
        CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;"
      register: _db_create
      changed_when: _db_create.rc == 0

    - name: 👤 DB-User erstellen - db_mysql.yml
      ansible.builtin.command: >
        mysql -u root -e
        "CREATE USER IF NOT EXISTS '{{ app_name }}'@'localhost' IDENTIFIED BY '{{ app_db_password }}';
        GRANT ALL PRIVILEGES ON \`{{ app_name }}\`.* TO '{{ app_name }}'@'localhost';
        FLUSH PRIVILEGES;"
      register: _user_create
      changed_when: _user_create.rc == 0
      no_log: true

    - name: ✅ MySQL (Nativ) ist Ready!
      ansible.builtin.debug:
        msg: "✅ MySQL läuft nativ — DB: {{ app_name }}, User: {{ app_name }}@localhost"

  when: app_deploy_type == 'nativ'
