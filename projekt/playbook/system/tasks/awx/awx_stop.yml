---
###########################################################################
# ⏸️ awx_stop.yml
# AWX Pods stoppen (Kubernetes)
###########################################################################

- name: ⏸️ AWX Deployments skalieren auf 0 - awx_stop.yml
  ansible.builtin.command: kubectl scale deployment --all --replicas=0 -n {{ app_name }}
  become_user: "{{ kube_user }}"
  environment:
    HOME: "/home/{{ kube_user }}"
    KUBECONFIG: "/home/{{ kube_user }}/.kube/config"
  changed_when: true
  failed_when: false

- name: ⏸️ AWX StatefulSets skalieren auf 0 - awx_stop.yml
  ansible.builtin.command: kubectl scale statefulset --all --replicas=0 -n {{ app_name }}
  become_user: "{{ kube_user }}"
  environment:
    HOME: "/home/{{ kube_user }}"
    KUBECONFIG: "/home/{{ kube_user }}/.kube/config"
  changed_when: true
  failed_when: false

- name: 📊 DEBUG Stop abgeschlossen - awx_stop.yml
  ansible.builtin.debug:
    msg: "⏸️ {{ app_name }} gestoppt"
