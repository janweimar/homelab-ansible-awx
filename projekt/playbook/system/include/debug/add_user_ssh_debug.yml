- name: 🔐 Debug – Benutzer & SSH Konfiguration anzeigen
  ansible.builtin.debug:
    msg:
      - "🔐 === BENUTZER & SSH KONFIGURATION ==="
      - "👤 Benutzer:"
      - "   - add_user_sudo:        {{ add_user_sudo | default('nicht gesetzt') }}"
      - "   - new_user_password:    {{ '********' if new_user_password is defined else 'nicht gesetzt' }}"
      - ""
      - "🔒 SSH Basis:"
      - "   - ssh_port:             {{ ssh_port | default(22) }}"
      - "   - enable_root_login:    {{ enable_root_login | default('prohibit-password') }}"
      - "   - enable_password_auth: {{ enable_password_auth | default(true) }}"
      - "   - use_pam:              {{ use_pam | default(true) }}"
      - "   - permit_empty_passwords: {{ permit_empty_passwords | default(false) }}"
      - ""
      - "🔧 SSH Sicherheit:"
      - "   - max_auth_tries:       {{ max_auth_tries | default(6) }}"
      - "   - login_grace_time:     {{ login_grace_time | default(120) }}"
      - "   - max_sessions:         {{ max_sessions | default(10) }}"
      - "   - allow_users_whitelist: {{ allow_users_whitelist | default('nicht gesetzt') }}"
      - ""
      - "🔐 SSH Krypto:"
      - "   - kex_algorithms:       {{ kex_algorithms | default('nicht gesetzt') }}"
      - "   - ciphers:              {{ ciphers | default('nicht gesetzt') }}"
      - "   - macs:                 {{ macs | default('nicht gesetzt') }}"
      - ""
      - "📡 SSH Verbindung:"
      - "   - tcp_keepalive:        {{ tcp_keepalive | default(true) }}"
      - "   - client_alive_interval: {{ client_alive_interval | default(0) }}"
      - "   - x11_forwarding:       {{ x11_forwarding | default(false) }}"
      - ""
      - "📋 SSH Sonstiges:"
      - "   - log_level:            {{ log_level | default('INFO') }}"
      - "   - syslog_facility:      {{ syslog_facility | default('AUTH') }}"
      - "   - print_motd:           {{ print_motd | default(true) }}"
      - "   - banner_bool:          {{ banner_bool | default('nicht gesetzt') }}"
      - "   - additional_config:    {{ additional_config | default('nicht gesetzt') }}"
      - ""
      - "💾 Logging:"
      - "   - log_save_db:          {{ log_save_db | default('nicht gesetzt') }}"
      - "   - log_db_host:          {{ log_db_host | default('nicht gesetzt') }}"
      - "   - log_db_name:          {{ log_db_name | default('nicht gesetzt') }}"
      - "   - log_db_port:          {{ log_db_port | default('nicht gesetzt') }}"
      - "   - log_db_type:          {{ log_db_type | default('nicht gesetzt') }}"
      - "   - log_db_user:          {{ log_db_user | default('nicht gesetzt') }}"
      - "   - log_db_table:         {{ log_db_table | default('nicht gesetzt') }}"
      - "   - log_db_password:      {{ '********' if log_db_password is defined else 'nicht gesetzt' }}"
      - "   - log_save_awx:         {{ log_save_awx | default('nicht gesetzt') }}"
      - "   - log_save_awx_path:    {{ log_save_awx_path | default(doku_paths.log_doku_awx_default, true) }}"
      - "   - log_save_client:      {{ log_save_client | default('nicht gesetzt') }}"
      - "   - log_save_client_path: {{ log_save_client_path | default(doku_paths.log_doku_client_default, true) }}"
      - "   - log_send_email:       {{ log_send_email | default('nicht gesetzt') }}"
      - "   - log_email_address:    {{ log_email_address | default('nicht gesetzt') }}"
