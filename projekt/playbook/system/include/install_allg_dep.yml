---
- name: Installiere Abhängigkeiten (Debian)
  ansible.builtin.apt:
    name: "{{ item.name }}{{ '=' + item.version if item.version|length > 0 else '' }}"
    state: present
  loop: "{{ var_dependencies_list
    | map('extract', packages.apt)
    | map(attribute='Debian')
    | map(attribute=sys_major|string)
    | flatten }}"
  environment: { DEBIAN_FRONTEND: noninteractive }
  when:
    - ansible_os_family == "Debian"
    - (var_dependencies_list | default([])) | length > 0
