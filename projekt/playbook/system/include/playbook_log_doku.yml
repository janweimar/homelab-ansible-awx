---
###########################################################################
# Playbook Log/Dokumentation erstellen und verteilen
# Generischer Task für alle Playbooks
###########################################################################
# Benötigte Variable vom aufrufenden Playbook:
#   log_template_file: "{{ doku_paths.xxx_uebersicht }}"
#
# Credentials (cred_playbook_log_doku):
#   log_save_client: true/false
#   log_save_client_path: (optional, default aus file_paths)
#   log_save_awx: true/false
#   log_save_awx_path: (optional, default aus file_paths)
#   log_send_email: true/false
#   smtp_user: SMTP-Absender (AWX Credential, aus msmtp-Playbook)
#   log_save_db: true/false
#   log_db_type: mysql/postgresql
#   log_db_host: IP oder Hostname
#   log_db_port: Port
#   log_db_name: Datenbankname
#   log_db_user: Benutzername
#   log_db_password: Passwort
#   log_db_table: Tabellenname
###########################################################################

###########################################################################
# 1. Validierung
###########################################################################
- name: ✅ Prüfe ob log_template_file definiert ist
  ansible.builtin.fail:
    msg: "Variable 'log_template_file' muss definiert sein!"
  when: log_template_file is not defined or log_template_file | length == 0

###########################################################################
# 2. Generiere Dokumentation aus Template in temporärer Datei
###########################################################################
- name: 📁 Generiere Dokumentation aus Template in temporärer Datei
  block:
    - name: 📁 Erstelle temporäres Verzeichnis auf Client
      ansible.builtin.file:
        path: "/tmp/awx/dok"
        state: directory
        mode: "0755"

    - name: 📊 Setze lesbaren Zeitstempel
      ansible.builtin.set_fact:
        timestamp_readable: "{{ ansible_date_time.date }}_{{ ansible_date_time.time | replace(':', '-') }}"

    - name: Erstelle eindeutigen File-Namen für Log-Datei
      ansible.builtin.set_fact:
        file_name_doku: "{{ pb_doku_template }}_{{ awx_job_id }}_{{ ansible_hostname }}_{{ timestamp_readable }}.md"

    - name: 🔍 DIAGNOSE - Template Pfade prüfen
      ansible.builtin.debug:
        msg:
          - "Quelle (src): >{{ log_template_file | default('NICHTS DEFINIERT') }}<"
          - "Ziel (dest): >/tmp/awx/dok/{{ file_name_doku }}<"
          - "Job ID: {{ awx_job_id | default('KEINE JOB ID') }}"

    - name: 📄 Generiere Dokumentation aus Template
      ansible.builtin.template:
        src: "{{ log_template_file }}"
        dest: "/tmp/awx/dok/{{ file_name_doku }}"
        mode: "0644"
      register: log_template_result

    - name: 🔍 DIAGNOSE - Ergebnis des Template-Tasks
      ansible.builtin.debug:
        var: log_template_result

###########################################################################
# 3. Template rendern (temporär)
###########################################################################
- name: 💾 Speichere Dokumentation auf Client
  block:
    - name: 📁 Erstelle Zielverzeichnis auf Client
      ansible.builtin.file:
        # ', true' sorgt dafür, dass auch leere Strings aus Credentials
        # ignoriert werden und der Default-Pfad verwendet wird.
        path: "{{ log_save_client_path | default(doku_paths.log_doku_client_default, true) }}"
        state: directory
        mode: "0755"

    - name: 📄 Kopiere Dokumentation auf Client
      ansible.builtin.copy:
        src: "/tmp/awx/dok/{{ file_name_doku }}"
        dest: "{{ log_save_client_path | default(doku_paths.log_doku_client_default, true) }}/{{ file_name_doku }}"
        mode: "0644"
        # DIESE ZEILE MUSS HINZUGEFÜGT WERDEN:
        remote_src: true

    - name: 🔍 Überprüfe erstellte Dokumentationsdatei
      ansible.builtin.stat:
        path: "{{ log_save_client_path | default(doku_paths.log_doku_client_default, true) }}/{{ file_name_doku }}"
      register: doku_file_stat

    - name: 🛑 Abbruch, falls Datei nicht existiert oder leer ist
      ansible.builtin.fail:
        msg: "Fehler: Die Dokumentation wurde nicht korrekt erstellt oder ist leer (0 KB)!"
      when:
        - not doku_file_stat.stat.exists
        - doku_file_stat.stat.size == 0

    - name: ✅ Bestätigung der Dokumentationserstellung
      ansible.builtin.debug:
        msg: "Doku wurde erfolgreich erstellt: {{ log_save_client_path | default(doku_paths.log_doku_client_default, true) }}/{{ file_name_doku }} (Größe: {{ (doku_file_stat.stat.size / 1024) | round(2) }} KB)"
      when: doku_file_stat.stat.exists and doku_file_stat.stat.size > 0

  # Die Bedingung stellt sicher, dass der Block nur läuft, wenn gewünscht
  when: log_save_client | default(false) | bool

