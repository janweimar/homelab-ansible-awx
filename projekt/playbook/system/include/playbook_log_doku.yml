###########################################################################
# 5. Email versenden
###########################################################################
- name: 📧 Versende Dokumentation per Email
  block:
    - name: 📧 Fallback smtp_user = admin_email falls nicht definiert
      ansible.builtin.set_fact:
        smtp_user: "{{ admin_email }}"
      when:
        - smtp_user is not defined or smtp_user | length == 0
        - admin_email is defined and admin_email | length > 0

    - name: 📧 Prüfe ob msmtp installiert ist - playbook_log_doku.yml
      ansible.builtin.command: which msmtp
      register: msmtp_check
      ignore_errors: true
      changed_when: false

    - name: 📧 Sende Email mit Dokumentation - playbook_log_doku.yml
      ansible.builtin.shell: |
        printf 'Subject: [{{ urls[ansible_host].msmtp.subject_prefix }}] Playbook Doku - {{ ansible_date_time.iso8601 }}\nFrom: {{ smtp_user }}\nTo: {{ admin_email }}\nMIME-Version: 1.0\nContent-Type: text/plain; charset=UTF-8\n\n' \
        | cat - {{ log_save_client_path | default(doku_paths.log_doku_client_default, true) }}/{{ file_name_doku }} \
        | msmtp -a {{ urls[ansible_host].msmtp.account }} {{ admin_email }}
      register: email_result
      retries: 3
      delay: 10
      until: email_result.rc == 0
      when:
        - msmtp_check.rc == 0
        - smtp_user is defined
        - admin_email is defined

    - name: ⚠️ Email übersprungen (smtp_user oder admin_email fehlt) - playbook_log_doku.yml
      ansible.builtin.debug:
        msg: "WARNUNG: smtp_user oder admin_email nicht definiert - Email wird übersprungen! SMTP-Credential am JT hinzufügen."
      when: smtp_user is not defined or admin_email is not defined

    - name: ⚠️ msmtp nicht verfügbar - playbook_log_doku.yml
      ansible.builtin.debug:
        msg: "WARNUNG: 'msmtp' nicht installiert - Email wird übersprungen!"
      when:
        - msmtp_check.rc != 0
        - smtp_user is defined

    - name: ✅ Email erfolgreich versendet - playbook_log_doku.yml
      ansible.builtin.debug:
        msg: "Dokumentation versendet an: {{ admin_email | default('unbekannt') }}"
      when:
        - msmtp_check.rc == 0
        - smtp_user is defined
        - admin_email is defined
  when:
    - log_send_email | default(false) | bool

###########################################################################
# 6. In Datenbank schreiben
###########################################################################
- name: 🗄️ Speichere Dokumentation in Datenbank
  ansible.builtin.include_tasks: "{{ include_paths.playbook_log_doku_db }}"
  when:
    - log_save_db | default(false) | bool
    - log_db_host is defined
    - log_db_name is defined
    - log_db_user is defined
    - log_db_password is defined
    - log_db_table is defined
    - log_db_type is defined

###########################################################################
# 7. Temporäre Datei aufräumen
###########################################################################
- name: 🗑️ Lösche temporäre Dokumentation
  ansible.builtin.file:
    path: "/tmp/awx/dok/{{ file_name_doku }}"
    state: absent
