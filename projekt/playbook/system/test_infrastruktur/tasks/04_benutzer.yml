---
###########################################################################
# 👤 Modul 04 — Benutzer & Berechtigungen
# =========================================================================
# Zweck  : User, Gruppen, sudo, SSH-Konfiguration und Login-Analyse
# Liest  : /etc/passwd, /etc/group, /etc/sudoers, /etc/ssh/sshd_config,
#          ~/.ssh/authorized_keys, last, lastlog, auth.log
# Schreibt in: benutzer_results
# READ-ONLY — keine Änderungen am System!
###########################################################################

# =========================================================================
# Benutzer erfassen
# =========================================================================

- name: "04 | Alle User aus /etc/passwd lesen"
  ansible.builtin.command: cat /etc/passwd
  register: reg_passwd
  changed_when: false
  failed_when: false

- name: "04 | Login-fähige User ermitteln (Shell != nologin/false)"
  ansible.builtin.shell: >
    awk -F: '$7 !~ /nologin|false/ {print $1, $3, $4, $6, $7}' /etc/passwd
  register: reg_user_login
  changed_when: false
  failed_when: false

- name: "04 | Alle Gruppen lesen"
  ansible.builtin.command: cat /etc/group
  register: reg_groups
  changed_when: false
  failed_when: false

- name: "04 | Sudo-Berechtigungen /etc/sudoers lesen"
  ansible.builtin.command: cat /etc/sudoers
  register: reg_sudoers
  changed_when: false
  failed_when: false

- name: "04 | Sudo-Berechtigungen /etc/sudoers.d/ erfassen"
  ansible.builtin.find:
    paths: /etc/sudoers.d
    file_type: file
  register: reg_sudoers_d_files

- name: "04 | Inhalt /etc/sudoers.d/ lesen"
  ansible.builtin.command: "cat {{ item.path }}"
  loop: "{{ reg_sudoers_d_files.files }}"
  register: reg_sudoers_d
  changed_when: false
  failed_when: false

- name: "04 | User mit sudo ALL=(ALL) ermitteln"
  ansible.builtin.shell: grep -E '^\s*\w+\s+ALL=\(ALL\)' /etc/sudoers /etc/sudoers.d/* 2>/dev/null
  register: reg_sudo_all
  changed_when: false
  failed_when: false

- name: "04 | Leere Passwörter prüfen"
  ansible.builtin.shell: >-
    awk -F: '($2 == "" || $2 == "!!" ) {print $1}' /etc/shadow
  register: reg_leere_passwoerter
  changed_when: false
  failed_when: false

# =========================================================================
# SSH-Konfiguration
# =========================================================================

- name: "04 | SSH-Konfiguration lesen"
  ansible.builtin.command: cat /etc/ssh/sshd_config
  register: reg_sshd_config
  changed_when: false
  failed_when: false

- name: "04 | SSH-Syntax validieren"
  ansible.builtin.command: sshd -t
  register: reg_sshd_syntax
  changed_when: false
  failed_when: false

- name: "04 | Root-Login SSH prüfen"
  ansible.builtin.shell: grep -i 'PermitRootLogin' /etc/ssh/sshd_config | grep -v '^#' | awk '{print $2}'
  register: reg_ssh_root_login
  changed_when: false
  failed_when: false

- name: "04 | SSH Passwort-Authentifizierung prüfen"
  ansible.builtin.shell: grep -i 'PasswordAuthentication' /etc/ssh/sshd_config | grep -v '^#' | awk '{print $2}'
  register: reg_ssh_pw_auth
  changed_when: false
  failed_when: false

- name: "04 | SSH-Port ermitteln"
  ansible.builtin.shell: grep -i '^Port' /etc/ssh/sshd_config | awk '{print $2}'
  register: reg_ssh_port
  changed_when: false
  failed_when: false

- name: "04 | Authorized Keys aller User sammeln"
  ansible.builtin.shell: >
    for user in $(cut -f1 -d: /etc/passwd); do
      homedir=$(getent passwd "$user" | cut -f6 -d:);
      keyfile="$homedir/.ssh/authorized_keys";
      if [ -f "$keyfile" ]; then
        echo "=== $user: $keyfile ===";
        cat "$keyfile";
      fi;
    done
  register: reg_authorized_keys
  changed_when: false
  failed_when: false

# =========================================================================
# Login-Analyse
# =========================================================================

- name: "04 | Letzte erfolgreiche Logins erfassen"
  ansible.builtin.command: last -n 20
  register: reg_last_logins
  changed_when: false
  failed_when: false

- name: "04 | Letzter Login je User (lastlog)"
  ansible.builtin.command: lastlog
  register: reg_lastlog
  changed_when: false
  failed_when: false

- name: "04 | Fehlgeschlagene Logins erfassen"
  ansible.builtin.command: lastb -n 20
  register: reg_failed_logins
  changed_when: false
  failed_when: false

- name: "04 | SUID-Dateien finden"
  ansible.builtin.command: find / -perm -4000 -type f 2>/dev/null
  register: reg_suid_files
  changed_when: false
  failed_when: false
  timeout: 60

# =========================================================================
# Ergebnisse in Variable speichern
# =========================================================================

- name: "04 | Ergebnisse in benutzer_results speichern"
  ansible.builtin.set_fact:
    benutzer_results:
      status: >-
        {{
          'FEHLER' if reg_leere_passwoerter.stdout_lines | length > 0
          else 'WARNUNG' if (reg_ssh_root_login.stdout | lower in ['yes', 'without-password', 'prohibit-password'])
          else 'WARNUNG' if (reg_ssh_pw_auth.stdout | lower == 'yes')
          else 'OK'
        }}
      zusammenfassung:
        ok: "{{ reg_user_login.stdout_lines | length }}"
        warnungen: "{{ reg_failed_logins.stdout_lines | length }}"
        fehler: "{{ reg_leere_passwoerter.stdout_lines | length }}"
      details:
        - name: "Login-fähige User"
          status: "OK"
          wert: "{{ reg_user_login.stdout_lines | length }} User können sich einloggen"
          hinweis: ""

        - name: "Leere Passwörter"
          status: "{{ 'FEHLER' if reg_leere_passwoerter.stdout_lines | length > 0 else 'OK' }}"
          wert: "{{ reg_leere_passwoerter.stdout | default('Keine') }}"
          hinweis: "{{ 'KRITISCH: User ohne Passwort gefunden!' if reg_leere_passwoerter.stdout_lines | length > 0 else '' }}"

        - name: "Sudo ALL=(ALL) User"
          status: "{{ 'WARNUNG' if reg_sudo_all.stdout_lines | length > 0 else 'OK' }}"
          wert: "{{ reg_sudo_all.stdout_lines | length }} Einträge mit Vollzugriff"
          hinweis: "{{ 'User mit uneingeschränktem sudo-Zugriff: ' + reg_sudo_all.stdout if reg_sudo_all.stdout_lines | length > 0 else '' }}"

        - name: "SSH Root-Login"
          status: "{{ 'WARNUNG' if reg_ssh_root_login.stdout | lower in ['yes'] else 'OK' }}"
          wert: "{{ reg_ssh_root_login.stdout | default('nicht konfiguriert') }}"
          hinweis: "{{ 'SSH Root-Login erlaubt — deaktivieren empfohlen' if reg_ssh_root_login.stdout | lower == 'yes' else '' }}"

        - name: "SSH Passwort-Authentifizierung"
          status: "{{ 'WARNUNG' if reg_ssh_pw_auth.stdout | lower == 'yes' else 'OK' }}"
          wert: "{{ reg_ssh_pw_auth.stdout | default('nicht konfiguriert') }}"
          hinweis: "{{ 'SSH Passwort-Auth aktiv — Key-only empfohlen' if reg_ssh_pw_auth.stdout | lower == 'yes' else '' }}"

        - name: "SSH Port"
          status: "{{ 'WARNUNG' if not reg_ssh_port.stdout or reg_ssh_port.stdout == '22' else 'OK' }}"
          wert: "{{ reg_ssh_port.stdout | default('22 (Standard)') }}"
          hinweis: "{{ 'SSH läuft auf Standard-Port 22' if not reg_ssh_port.stdout or reg_ssh_port.stdout == '22' else '' }}"

        - name: "SSH Syntax-Validierung"
          status: "{{ 'FEHLER' if reg_sshd_syntax.rc != 0 else 'OK' }}"
          wert: "{{ 'Syntax OK' if reg_sshd_syntax.rc == 0 else 'Syntax-Fehler!' }}"
          hinweis: "{{ reg_sshd_syntax.stderr if reg_sshd_syntax.rc != 0 else '' }}"

        - name: "Fehlgeschlagene Login-Versuche"
          status: "{{ 'WARNUNG' if reg_failed_logins.stdout_lines | length > 2 else 'OK' }}"
          wert: "{{ reg_failed_logins.stdout_lines | length }} fehlgeschlagene Logins"
          hinweis: "{{ 'Erhöhte Anzahl fehlgeschlagener Logins — Brute-Force möglich?' if reg_failed_logins.stdout_lines | length > 2 else '' }}"

        - name: "SUID-Dateien"
          status: "{{ 'WARNUNG' if reg_suid_files.stdout_lines | length > 15 else 'OK' }}"
          wert: "{{ reg_suid_files.stdout_lines | length }} SUID-Dateien gefunden"
          hinweis: "{{ 'Ungewöhnlich viele SUID-Dateien — bitte prüfen' if reg_suid_files.stdout_lines | length > 15 else '' }}"

      user_login_faehig: "{{ reg_user_login.stdout_lines | default([]) }}"
      letzte_logins: "{{ reg_last_logins.stdout_lines | default([]) }}"
      fehlgeschlagene_logins: "{{ reg_failed_logins.stdout_lines | default([]) }}"
      authorized_keys: "{{ reg_authorized_keys.stdout_lines | default([]) }}"
      suid_dateien: "{{ reg_suid_files.stdout_lines | default([]) }}"

- name: "04 | ✅ Benutzer-Analyse abgeschlossen"
  ansible.builtin.debug:
    msg: "Benutzer erfasst — {{ reg_user_login.stdout_lines | length }} login-fähig — Status: {{ benutzer_results.status }}"
