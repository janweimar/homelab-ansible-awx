###########################################################################
# Audit-Regeln - OS-spezifisch
###########################################################################

rules:
  audit:
    # BEISPIEL-REGELN (für andere Server)
    example:
      Debian:
        ###################################################################
        # BEISPIEL: Vollständige Audit-Regeln für verschiedene Szenarien
        # Diese Regeln können kopiert und an spezifische Server angepasst werden
        ###################################################################

        # 1. IDENTITÄTS-MANAGEMENT
        - "-w /etc/passwd -p wa -k identity"
        - "-w /etc/group -p wa -k identity"
        - "-w /etc/shadow -p wa -k identity"
        - "-w /etc/gshadow -p wa -k identity"

        # 2. PRIVILEGIEN & BERECHTIGUNGEN
        - "-w /etc/sudoers -p wa -k scope"
        - "-w /etc/sudoers.d/ -p wa -k scope"

        # 3. AUTHENTIFIZIERUNG & LOGIN
        - "-w /var/log/auth.log -p wa -k auth"
        - "-w /etc/pam.d/ -p wa -k pam"
        - "-w /etc/security/ -p wa -k pam"

        # 4. SSH-KONFIGURATION
        - "-w /etc/ssh/sshd_config -p wa -k sshd"
        - "-w /etc/ssh/sshd_config.d/ -p wa -k sshd"

        # 5. SYSTEM-ZEIT-ÄNDERUNGEN
        - "-a always,exit -F arch=b64 -S adjtimex -S settimeofday -S clock_settime -k time-change"
        - "-a always,exit -F arch=b32 -S adjtimex -S settimeofday -S stime -S clock_settime -k time-change"

        # 6. KERNEL-MODULE (Rootkit-Erkennung)
        - "-a always,exit -F arch=b64 -S init_module -S delete_module -k modules"
        - "-a always,exit -F arch=b32 -S init_module -S delete_module -k modules"

        # 7. NETZWERK-KONFIGURATION
        - "-w /etc/hosts -p wa -k network"
        - "-w /etc/hostname -p wa -k network"
        - "-w /etc/network/ -p wa -k network"
        - "-a always,exit -F arch=b64 -S sethostname -S setdomainname -k network"
        - "-a always,exit -F arch=b32 -S sethostname -S setdomainname -k network"

        # 8. FIREWALL (nftables)
        - "-w /etc/nftables.conf -p wa -k firewall"
        - "-w /etc/nftables.d/ -p wa -k firewall"

        # 9. FAIL2BAN
        - "-w /etc/fail2ban/jail.conf -p wa -k fail2ban"
        - "-w /etc/fail2ban/jail.d/ -p wa -k fail2ban"
        - "-w /etc/fail2ban/filter.d/ -p wa -k fail2ban"

        # 10. APPARMOR
        - "-w /etc/apparmor/ -p wa -k apparmor"
        - "-w /etc/apparmor.d/ -p wa -k apparmor"

        # 11. NGINX
        - "-w /etc/nginx/nginx.conf -p wa -k nginx"
        - "-w /etc/nginx/sites-enabled/ -p wa -k nginx"
        - "-w /etc/nginx/sites-available/ -p wa -k nginx"

        # 12. DOCKER
        - "-w /etc/docker/daemon.json -p wa -k docker"
        - "-w /usr/bin/docker -p x -k docker"

        # 13. CONTAINERD
        - "-w /etc/containerd/config.toml -p wa -k containerd"

        # 14. KUBERNETES
        - "-w /etc/kubernetes/ -p wa -k k8s"
        - "-w /var/lib/kubelet/ -p wa -k k8s"

        # 15. DATENBANKEN
        - "-w /etc/mysql/ -p wa -k database"
        - "-w /etc/mariadb/ -p wa -k database"
        - "-w /etc/postgresql/ -p wa -k database"

        # 16. SSL/TLS ZERTIFIKATE
        - "-w /etc/letsencrypt/ -p wa -k ssl"
        - "-w /etc/ssl/certs/ -p wa -k ssl"
        - "-w /etc/ssl/private/ -p wa -k ssl"

        # 17. GIT/CGIT
        - "-w /srv/git/ -p wa -k git-repos"
        - "-w /etc/cgitrc -p wa -k cgit"

        # 18. APTLY
        - "-w /etc/aptly.conf -p wa -k aptly"
        - "-w /srv/aptly/ -p wa -k aptly"

        # 19. CRON JOBS
        - "-w /etc/cron.d/ -p wa -k cron"
        - "-w /etc/cron.daily/ -p wa -k cron"
        - "-w /etc/cron.hourly/ -p wa -k cron"
        - "-w /etc/cron.monthly/ -p wa -k cron"
        - "-w /etc/cron.weekly/ -p wa -k cron"
        - "-w /var/spool/cron/crontabs/ -p wa -k cron"

        # 20. SYSTEMD SERVICES
        - "-w /etc/systemd/system/ -p wa -k systemd"
        - "-w /lib/systemd/system/ -p wa -k systemd"

        # 21. AUDIT SELBST
        - "-w /etc/audit/ -p wa -k audit-config"
        - "-w /var/log/audit/ -p wa -k audit-log"

        # 22. FILE DELETION EVENTS
        - "-a always,exit -F arch=b64 -S unlink -S unlinkat -S rename -S renameat -k delete"
        - "-a always,exit -F arch=b32 -S unlink -S unlinkat -S rename -S renameat -k delete"

        # 23. PRIVILEGIERTE BEFEHLE
        - "-a always,exit -F path=/usr/bin/sudo -F perm=x -F auid>=1000 -F auid!=4294967295 -k privileged"
        - "-a always,exit -F path=/usr/bin/su -F perm=x -F auid>=1000 -F auid!=4294967295 -k privileged"

