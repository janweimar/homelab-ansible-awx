---
###########################################################################
# 📦 OS-abhängige Paketlisten
#    → zentrale Matrix für Installation/Deinstallation je nach Distribution
#    → jedes Paket als Dict mit name + version
###########################################################################
# Struktur:
# packages:
#   apt:
#     <Paketgruppe>:
#       <Debian>:
#         - { name: "<Paketname>", version: "<Version>" }
#       <RedHat>:
#   gem:
#     <Debian>:
#       <Distribution>:
#         - { name: "<Paketname>", version: "<Version>" }
#   pip:
#     <Debian>:
#

packages:
  apt:
    nftables:
      Debian:
        24: # {{ sys_major }}
          - { name: "nftables", version: "" }
          - { name: "python3-nftables", version: "" }
          - { name: "netfilter-persistent", version: "" }
          - { name: "at", version: "" }

