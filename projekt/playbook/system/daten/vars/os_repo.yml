# ============================================================================
# Helm Chart Cache — Lokale Kopien von Helm Charts für Reproduzierbarkeit
# ============================================================================
# Gleiche Logik wie Aptly (APT) und cgit (Git):
#   - Charts werden von Upstream gezogen und lokal auf dem Repo-Server gecacht
#   - nginx liefert /helm/ aus → lokales Helm-Repo
#   - In 2 Jahren genau die gleichen Chart-Versionen verfügbar
#
# Playbook: pb_conf_helm_charts_repo_server.yml
# Auslieferung: https://repo.allgemeinhobby.de/helm/
# ============================================================================
helm_charts:
  - repo_name: awx-operator
    repo_url: "https://ansible-community.github.io/awx-operator-helm/"
    charts:
      - { name: "awx-operator", version: "2.19.1" }
      - { name: "awx-operator", version: "2.19.0" }

  - repo_name: bitnami
    repo_url: "https://charts.bitnami.com/bitnami"
    charts:
      - { name: "odoo", version: "28.2.10" }
      # Neue Odoo-Versionen hier ergänzen

  # - repo_name: ingress-nginx
  #   repo_url: "https://kubernetes.github.io/ingress-nginx"
  #   charts:
  #     - { name: "ingress-nginx", version: "X.X.X" }
