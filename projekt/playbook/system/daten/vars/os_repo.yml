---
# System-Repos die NIEMALS gelöscht werden
system_repos_protected:
  - ubuntu
  - ubuntu-security
  - ubuntu24

# =============================================================================
# binary_key: false muss mit gpg --dearmor in binär umgewandelt werden
# binary_key: true kann direkt als binärdatei verwendet werden

repo:
  repo_self:
    Debian:
      - name: repo_self
        type: sources
        key: "https://repo.allgemeinhobby.de/aptly/repo_self_key.gpg"
        binary_key: false
        content: |
          Types: deb
          URIs: https://repo.allgemeinhobby.de/aptly/repo_self
          Suites: stable
          Components: main
          Architectures: amd64
          Signed-By: /etc/apt/keyrings/repo_self_key.gpg

  docker:
    Debian:
      - name: docker
        type: sources
        key: "https://download.docker.com/linux/ubuntu/gpg"
        binary_key: false
        content: |
          Types: deb
          URIs: https://download.docker.com/linux/ubuntu
          Suites: {{ ansible_lsb.codename }}
          Components: stable
          Architectures: amd64
          Signed-By: /etc/apt/keyrings/docker.gpg

  kube_1_34:
    Debian:
      - name: kube_1_34
        type: sources
        key: "https://pkgs.k8s.io/core:/stable:/v1.34/deb/Release.key"
        binary_key: false
        content: |
          Types: deb
          URIs: https://pkgs.k8s.io/core:/stable:/v1.34/deb/
          Suites: /
          Components:
          Signed-By: /etc/apt/keyrings/kube_1_34.gpg

  helm: # Ein klarer Name für das Programm + Kanal
    Debian:
      - name: helm
        type: sources
        key: "https://packages.buildkite.com/helm-linux/helm-debian/gpgkey"
        binary_key: false
        content: |
          Types: deb
          URIs: https://packages.buildkite.com/helm-linux/helm-debian/any/
          Suites: any
          Components: main
          Signed-By: /etc/apt/keyrings/helm.gpg

# ----------------------------------------------------------------------------
# Aptly Mirror Definitionen plus Puplish-Parameter
# erlaubte einträge für arch_filter: amd64,arm64,armhf,i386,ppc64el,riscv64,s390x,all
# ----------------------------------------------------------------------------
aptly_mirrors:
  #  - name: ubuntu_main_universe
  #    url: "http://archive.ubuntu.com/ubuntu"
  #    dist: "noble, jammy, ....  " # eintrag mehrerer distros möglich, werden dann als jeweils als ein mirror seperat angelegt.
  #    components: ["main", "universe"]

  - name: ubuntu_main_universe
    url: "http://archive.ubuntu.com/ubuntu"
    dist: "{{ ansible_lsb.codename }}"
    components: ["main", "universe"]
    key_url: "http://archive.ubuntu.com/ubuntu/project/ubuntu-archive-keyring.gpg"
    arch_filter: "amd64"
    # ⬇️ NUR für Publish

  - name: ubuntu_updates
    url: "http://archive.ubuntu.com/ubuntu"
    dist: "{{ ansible_lsb.codename }}-updates"
    components: ["main", "universe"]
    key_url: "http://archive.ubuntu.com/ubuntu/project/ubuntu-archive-keyring.gpg"
    arch_filter: "amd64"

  - name: ubuntu_security
    url: "http://security.ubuntu.com/ubuntu"
    dist: "{{ ansible_lsb.codename }}-security"
    components: ["main", "universe"]
    key_url: "http://archive.ubuntu.com/ubuntu/project/ubuntu-archive-keyring.gpg"
    arch_filter: "amd64"

  - name: docker
    url: "https://download.docker.com/linux/ubuntu"
    dist: "{{ ansible_lsb.codename }}"
    components: ["stable"]
    key_url: "https://download.docker.com/linux/ubuntu/gpg"
    arch_filter: "amd64"
    # ⬇️ NUR für Publish

  - name: kube_1_34
    url: "https://pkgs.k8s.io/core:/stable:/v1.34/deb/"
    dist: "./" # Punkt vor dem Slash für Flat Repos
    components: [] # Komplett leere Liste, kein [""]
    key_url: "https://pkgs.k8s.io/core:/stable:/v1.34/deb/Release.key" # ← HINZUFÜGEN
    arch_filter: "amd64"
    # ⬇️ NUR für Publish

  - name: "helm"
    url: "https://packages.buildkite.com/helm-linux/helm-debian/any/"
    dist: "any"
    components: ["main"]
    key_url: "https://packages.buildkite.com/helm-linux/helm-debian/gpgkey"
    arch_filter: "amd64"
    # ⬇️ NUR für Publish

# ------------------------------------------------------------
# Aptly Publish Defaults sind nur für repo_self relevant
# ------------------------------------------------------------

aptly_publish_defaults:
  distribution_publish: stable
  component_publish: main
  Architectures_publish: amd64
  gpg_apt_key_id: "7DE3CA01DC097508"
  gpg_git_key_id: "A5C8568E7D859EAF"
