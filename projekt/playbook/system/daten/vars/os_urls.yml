###########################################################################
# Zentrale URL-Verwaltung
# Wird von allen Playbooks geladen (ueber var_files)
# Zugriff: urls.<server_ip>.<dienst>.<attribut>
###########################################################################

urls:
  # VPN Server
  <ip_vpn_server>:
    msmtp:
      account: "web"
      host: "smtp.web.de"
      port: 587
      test_to: "<email> "
      subject_prefix: "VPN Server - <ip_vpn_server>"
      sudoers_user: "max"

  # Wazuh Manager
  <ip_wazuh_server>:
    wazuh:
      domain: wazuh.<domain> .de
      url: https://wazuh.<domain> .de
      port: 443
    msmtp:
      account: "web"
      host: "smtp.web.de"
      port: 587
      test_to: "<email> "
      subject_prefix: "Wazuh Manager - <ip_wazuh_server>"
      sudoers_user: "max"

  # Mail Server
  <ip_mail_server>:
    msmtp:
      account: "web"
      host: "smtp.web.de"
      port: 587
      test_to: "<email> "
      subject_prefix: "Mail Server - <ip_mail_server>"
      sudoers_user: "max"

  # Repo/Jump Server
  <ip_repo_server>:
    # AWX Execution Environment - Docker Registry
    awx_ee:
      domain: awx-ee.<domain> .de
      url: https://awx-ee.<domain> .de
      port: 5000
      registry: awx-ee.<domain> .de

    # Repo-Server (nginx - gemeinsame Domain fuer cgit + aptly)
    repo_server_apt:
      domain: repo.<domain> .de
      url: https://repo.<domain> .de/aptly
    repo_server_cgit:
      domain: repo.<domain> .de
      url: https://repo.<domain> .de/cgit

    # BookStack - Dokumentation
    bookstack:
      domain: bookstack.<domain> .de
      url: https://bookstack.<domain> .de
      port: 8080

    # msmtp - SMTP Mail-Versand
    msmtp:
      account: "web"
      host: "smtp.web.de"
      port: 587
      test_to: "<email> "
      subject_prefix: "Repo Server - <ip_repo_server>"
      sudoers_user: "max"

  # AI Server
  <ip_ai_server>:
    # Nginx Steuerung (VPN-only — kein SSL/ModSecurity nötig)
    server_ssl: false
    nginx_modsecurity: false

    # Ollama AI Runtime (API Backend, VPN-only)
    ollama:
      domain: ai.<domain> .de
      url: http://ai.<domain> .de
      port: 80

    # Open WebUI: kein nginx, direkt über NodePort 30080 (http://10.200.0.23:30080)

    msmtp:
      account: "web"
      host: "smtp.web.de"
      port: 587
      test_to: "<email> "
      subject_prefix: "AI Server - <ip_ai_server>"
      sudoers_user: "max"

  # Odoo Server
  <ip_odoo_server>:
    # Nginx Steuerung
    server_ssl: true
    nginx_modsecurity: true

    # Odoo ERP (Kubernetes/K3s)
    odoo:
      domain: odoo.<domain> .de
      url: https://odoo.<domain> .de
      port: 443

    msmtp:
      account: "web"
      host: "smtp.web.de"
      port: 587
      test_to: "<email> "
      subject_prefix: "Odoo Server - <ip_odoo_server>"
      sudoers_user: "max"

  # AWX Server
  <ip_awx_server>:
    # Nginx Steuerung
    server_ssl: true
    nginx_modsecurity: true

    # AWX Web-UI (Kubernetes/Minikube)
    awx:
      domain: awx.<domain> .de
      url: https://awx.<domain> .de
      port: 443

    # Directus CMS (Kubernetes/Minikube)
    directus:
      domain: directus.<domain> .de
      url: https://directus.<domain> .de
      port: 443

    # Stalwart Mail Server Admin-GUI (VPN-only)
    stalwart:
      domain: mail.<domain> .de
      url: http://mail.<domain> .de
      port: 80
      mail_domain: <domain> .de
      hostname: mail.<domain> .de

    # Mailu Mail-Server Admin-GUI (VPN-only)
    mailu:
      domain: mailu.<domain> .de
      url: http://mailu.<domain> .de
      port: 80
      mail_domain: <domain> .de
      hostname: mail.<domain> .de

    msmtp:
      account: "web"
      host: "smtp.web.de"
      port: 587
      test_to: "<email> "
      subject_prefix: "AWX Server - <ip_awx_server>"
      sudoers_user: "max"

  PLATZHALTER_IP:
    msmtp:
      account: "web"
      host: "smtp.web.de"
      port: 587
      test_to: "<email> "
      subject_prefix: "Simulation Server - PLATZHALTER_IP"
      sudoers_user: "max"
