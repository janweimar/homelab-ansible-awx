###########################################################################
# CHECKLISTE für neuen Kube-Stack-Eintrag:
#   1. Neuen Block anlegen (alten NICHT löschen!)
#   2. os_repo.yml: neues Repo kube_1_XX anlegen mit passender URL
#   3. os_repo.yml: aptly_mirrors um neuen kube-Eintrag erweitern
#   4. os_packages.yml: kube-Gruppe mit neuen Versionen aktualisieren
#   5. Credential-Type: neue choice in kube_stack_auswahl hinzufügen
#   6. Auf Test-Server validieren BEVOR produktiv geschaltet wird
#   7. datum aktualisieren nach erfolgreichem Test
#
# CHECKLISTE für neues Helm-App-Profil:
#   1. Neuen Block unter helm_app_versionen.<app> anlegen
#   2. Credential-Type: neue choice in <app>_app_auswahl hinzufügen
#   3. Auf Test-Server validieren
#   4. datum aktualisieren nach erfolgreichem Test
###########################################################################
