    datum: "2026-03-30"
    docker_version: "27.5"
    compose_version: "2.32"
    storage_driver: "overlay2"

  # docker_v28:
  #   beschreibung: "Docker CE 28.x — noch nicht getestet"
  #   datum: "2026-XX-XX"
