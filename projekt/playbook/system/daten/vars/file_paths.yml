######################################################################################
# File paths nach playbooks
######################################################################################

#######################################################################################
# Doku Pfade (Templates für Playbook-Übersichten)
#######################################################################################
doku_paths:
  # Default-Pfade für Playbook-Dokumentation global
  log_doku_client_default: /var/log/ansible/playbook_doku
  log_doku_awx_default: /var/lib/awx/playbook_doku

  # Ordner für READMEs
  readme_dir: /usr/local/share/doc/

  # Allgemeine Templates (Header/Footer für alle Playbooks)
  doku_template_md_j2:
    playbook/system/include/doku/doku_template.md.j2
    # "{{ include doku_paths.doku_template_md_j2 }}"

######################################################################################
# Test-Report Pfade
######################################################################################
test_report_dir: /var/log/system_test

######################################################################################
# AppArmor Profile Zuordnung
# Pro Server: welche Profile in welchem Modus (enforce/complain)
######################################################################################
apparmor_d:
  # Repo-Server <ip_repo_server>
  <ip_repo_server>:
    complain:
      - playbook/system/tasks/apparmor/templates/docker.j2
      - playbook/system/tasks/apparmor/templates/nginx_cgit_aptly_docker.j2
      - playbook/system/tasks/apparmor/templates/aptly.j2
      - playbook/system/tasks/apparmor/templates/cgit.j2
      - playbook/system/tasks/apparmor/templates/fcgiwrap.j2
      - playbook/system/tasks/apparmor/templates/fail2ban.j2
      - playbook/system/tasks/apparmor/templates/auditd.j2
      - playbook/system/tasks/apparmor/templates/sshd.j2
      - playbook/system/tasks/apparmor/templates/cron.j2

    enforce: []
