---
######################################################################################
# nginx Pfade / Templates
######################################################################################
nginx_paths:
  <ip_wazuh_server>:
    nginx_conf: playbook/system/tasks/nginx/templates/nginx.conf.j2
    modsecurity: playbook/system/tasks/nginx/templates/modsecurity.conf.j2
    vHost_certbot_temp: playbook/system/tasks/nginx/templates/vhost-certbot-temp.conf.j2
    nginx:
      vHost_80: playbook/system/tasks/nginx/templates/vhost-http.conf.j2
      vHost_443: playbook/system/tasks/nginx/templates/vhost-https.conf.j2
      app_vhost: playbook/system/tasks/nginx/templates/app-vhost.conf.j2
    wazuh:
      80:
        vHost_80: playbook/system/tasks/wazuh/templates/wazuh-vhost-http.conf.j2
      443:
        vHost_80: playbook/system/tasks/wazuh/templates/wazuh-vhost-http_redir.conf.j2
        vHost_443: playbook/system/tasks/wazuh/templates/wazuh-vhost-https.conf.j2

  <ip_ai_server>:
    # AI Server
    nginx_conf: playbook/system/tasks/nginx/templates/nginx.conf.j2
    modsecurity: playbook/system/tasks/nginx/templates/modsecurity.conf.j2
    vHost_certbot_temp: playbook/system/tasks/nginx/templates/vhost-certbot-temp.conf.j2
    nginx:
      vHost_80: playbook/system/tasks/nginx/templates/vhost-http.conf.j2
      vHost_443: playbook/system/tasks/nginx/templates/vhost-https.conf.j2
      app_vhost: playbook/system/tasks/nginx/templates/app-vhost.conf.j2

  <ip_awx_server>:
    # AWX Server
    nginx_conf: playbook/system/tasks/nginx/templates/nginx.conf.j2
    modsecurity: playbook/system/tasks/nginx/templates/modsecurity.conf.j2
    vHost_certbot_temp: playbook/system/tasks/nginx/templates/vhost-certbot-temp.conf.j2
    nginx:
      vHost_80: playbook/system/tasks/nginx/templates/vhost-http.conf.j2
      vHost_443: playbook/system/tasks/nginx/templates/vhost-https.conf.j2
      app_vhost: playbook/system/tasks/nginx/templates/app-vhost.conf.j2

  <ip_odoo_server>:
    # Odoo Server
    nginx_conf: playbook/system/tasks/nginx/templates/nginx.conf.j2
    modsecurity: playbook/system/tasks/nginx/templates/modsecurity.conf.j2
    vHost_certbot_temp: playbook/system/tasks/nginx/templates/vhost-certbot-temp.conf.j2
    nginx:
      vHost_80: playbook/system/tasks/nginx/templates/vhost-http.conf.j2
      vHost_443: playbook/system/tasks/nginx/templates/vhost-https.conf.j2
      app_vhost: playbook/system/tasks/nginx/templates/app-vhost.conf.j2

  <ip_repo_server>:
    # Global - für alle
    nginx_conf: playbook/system/tasks/nginx/templates/nginx.conf.j2
    modsecurity: playbook/system/tasks/nginx/templates/modsecurity.conf.j2
    vHost_certbot_temp: playbook/system/tasks/nginx/templates/vhost-certbot-temp.conf.j2

    # Pro Anwendung - nur vHosts unterschiedlich
    nginx:
      vHost_80: playbook/system/tasks/nginx/templates/vhost-http.conf.j2
      vHost_443: playbook/system/tasks/nginx/templates/vhost-https.conf.j2
      app_vhost: playbook/system/tasks/nginx/templates/app-vhost.conf.j2

    bookstack:
      80:
        vHost_80: playbook/system/tasks/bookstack/templates/bookstack-vhost-http.conf.j2
      443:
        vHost_80: playbook/system/tasks/bookstack/templates/bookstack-vhost-http_redir.conf.j2
        vHost_443: playbook/system/tasks/bookstack/templates/bookstack-vhost-https.conf.j2

    repo_server:
      aptly_conf: playbook/system/tasks/repo_server/templates/aptly_conf.j2
      cgitrc: playbook/system/tasks/repo_server/templates/cgitrc_cgit.j2
      80:
        vHost_80: playbook/system/tasks/repo_server/templates/repo-vhost-http.conf.j2
      443:
        vHost_80: playbook/system/tasks/repo_server/templates/repo-vhost-http_redir.conf.j2
        vHost_443: playbook/system/tasks/repo_server/templates/repo-vhost-https.conf.j2

    awx_ee:
      80:
        vHost_80: playbook/system/tasks/awx/awx_ee/templates/awx_ee-vhost-http.conf.j2
      443:
        vHost_80: playbook/system/tasks/awx/awx_ee/templates/awx_ee-vhost-http_redir.conf.j2
        vHost_443: playbook/system/tasks/awx/awx_ee/templates/awx_ee-vhost-https.conf.j2

###############################################################################
# File Paths - Server-spezifische Dateien
# Pro Server individuelle Konfiguration (SSH-Keys, Zertifikate, etc.)
###############################################################################
file_paths:
  key_gpg_paths: playbook/system/templates/key_gpg/.gnupg/
  wireguard_keys_path: playbook/system/templates/wireguard_keys/
  # firewall nftables
  wazuh_install_sh: playbook/system/skript/wazuh-install.sh
  validate_ips_script: playbook/system/skript/validate_ips.py
  parse_netvars: playbook/system/skript/parse_netvars.py
  nftable_config_j2: playbook/system/tasks/nftables/templates/nftable_config.j2

  # geoip nftables
  nft_geoip_script: playbook/system/skript/nft_geoip.py
  dbip_country_lite_csv: playbook/system/daten/dbip-country-lite.csv
  location_csv: playbook/system/daten/location.csv

  #########################################################################################
  ### server ports
  #########################################################################################
  server_port:
    <ip_vpn_server>: 10010
    <ip_wazuh_server>: 10020
    <ip_mail_server>: 10030
    <ip_repo_server>: 10040
    <ip_ai_server>: 10050
    <ip_odoo_server>: 10060
    <ip_awx_server>: 10070
    PLATZHALTER_IP: 10080

  #########################################################################################
  ### keys
  #########################################################################################
  ssh_pub_key:
    <ip_vpn_server>:
      max: playbook/system/tasks/add_user_ssh/templates/id_ed25519_vpn_max.pub
    <ip_wazuh_server>:
      max: playbook/system/tasks/add_user_ssh/templates/id_ed25519_wazuh_max.pub
    <ip_mail_server>:
      max: playbook/system/tasks/add_user_ssh/templates/id_ed25519_mail_max.pub
    <ip_repo_server>:
      max: playbook/system/tasks/add_user_ssh/templates/id_ed25519_repo_max.pub
    <ip_ai_server>:
      max: playbook/system/tasks/add_user_ssh/templates/id_ed25519_ai_max.pub
    <ip_odoo_server>:
      max: playbook/system/tasks/add_user_ssh/templates/id_ed25519_odoo_max.pub
    <ip_awx_server>:
      max: playbook/system/tasks/add_user_ssh/templates/id_ed25519_awx_max.pub
    PLATZHALTER_IP:
      max: playbook/system/tasks/add_user_ssh/templates/id_ed25519_sim_max.pub

  ssh_conf:
    <ip_vpn_server>: playbook/system/tasks/add_user_ssh/templates/sshd_config_secure.j2
    <ip_wazuh_server>: playbook/system/tasks/add_user_ssh/templates/sshd_config_secure.j2
    <ip_mail_server>: playbook/system/tasks/add_user_ssh/templates/sshd_config_secure.j2
    <ip_repo_server>: playbook/system/tasks/add_user_ssh/templates/sshd_config_secure.j2
    <ip_ai_server>: playbook/system/tasks/add_user_ssh/templates/sshd_config_secure.j2
    <ip_odoo_server>: playbook/system/tasks/add_user_ssh/templates/sshd_config_secure.j2
    <ip_awx_server>: playbook/system/tasks/add_user_ssh/templates/sshd_config_secure.j2
    PLATZHALTER_IP: playbook/system/tasks/add_user_ssh/templates/sshd_config_secure.j2
  cloud_init_ssh:
    <ip_vpn_server>: playbook/system/tasks/add_user_ssh/templates/cloud_init_ssh.j2
    <ip_wazuh_server>: playbook/system/tasks/add_user_ssh/templates/cloud_init_ssh.j2
    <ip_mail_server>: playbook/system/tasks/add_user_ssh/templates/cloud_init_ssh.j2
    <ip_repo_server>: playbook/system/tasks/add_user_ssh/templates/cloud_init_ssh.j2
    <ip_ai_server>: playbook/system/tasks/add_user_ssh/templates/cloud_init_ssh.j2
    <ip_odoo_server>: playbook/system/tasks/add_user_ssh/templates/cloud_init_ssh.j2
    <ip_awx_server>: playbook/system/tasks/add_user_ssh/templates/cloud_init_ssh.j2
    PLATZHALTER_IP: playbook/system/tasks/add_user_ssh/templates/cloud_init_ssh.j2

  # Banner für SSH-Login
  banner:
    <ip_vpn_server>: playbook/system/daten/banner/banner_vpn.txt
    <ip_wazuh_server>: playbook/system/daten/banner/banner_wazuh.txt
    <ip_mail_server>: playbook/system/daten/banner/banner_mail.txt
    <ip_repo_server>: playbook/system/daten/banner/banner_repo.txt
    <ip_ai_server>: playbook/system/daten/banner/banner_ai.txt
    <ip_odoo_server>: playbook/system/daten/banner/banner_odoo.txt
    <ip_awx_server>: playbook/system/daten/banner/banner_awx.txt
    PLATZHALTER_IP: playbook/system/daten/banner/banner_sim.txt

  # net_conf
  gai_conf:
    <ip_vpn_server>: playbook/system/tasks/net_conf/templates/ip4_gai_conf.j2
    <ip_wazuh_server>: playbook/system/tasks/net_conf/templates/ip4_gai_conf.j2
    <ip_mail_server>: playbook/system/tasks/net_conf/templates/ip4_gai_conf.j2
    <ip_repo_server>: playbook/system/tasks/net_conf/templates/ip4_gai_conf.j2
    <ip_ai_server>: playbook/system/tasks/net_conf/templates/ip4_gai_conf.j2
    <ip_odoo_server>: playbook/system/tasks/net_conf/templates/ip4_gai_conf.j2
    <ip_awx_server>: playbook/system/tasks/net_conf/templates/ip4_gai_conf.j2
    PLATZHALTER_IP: playbook/system/tasks/net_conf/templates/ip4_gai_conf.j2
