    global:
      ipv4:
        - 172.17.0.0/16 # docker0 Subnet
        - 192.168.203.0/24 # Mailu Docker Subnet
        - 10.42.0.0/16 # K3s Pod-Subnet (Flannel)
        - 10.43.0.0/16 # K3s Service-Subnet
      ipv6: []

    debian:
      ipv4: []
      ipv6: []

    # [VPN-Peer/Client] Kein Gateway-Forwarding
