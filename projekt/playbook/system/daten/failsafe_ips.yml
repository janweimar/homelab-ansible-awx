# Failsafe IPs for firewall rules
# enthalten:
# - in (Whitelist für eingehenden Traffic)
# - out (Whitelist für ausgehenden Traffic)
# - for (Forwarding-Regeln)
# - nat (NAT/Masquerade – nur VPN-Server)
# - f2b (Ignore-Liste für fail2ban)
#
# Server-Inventar (7 Cloud VPS):
# 1. VPN Server       - <ip_vpn_server>:10010 / <ip6_vpn_server>
# 2. Wazuh Manager    - <ip_wazuh_server>:10020    / <ip6_wazuh_server>
# 3. Mail Server      - <ip_mail_server>:10030  / <ip6_mail_server>
# 4. Repo/Jump Server - <ip_repo_server>:10040    / <ip6_repo_server>
# 5. AI Server        - <ip_ai_server>:10050   / <ip6_ai_server>
# 6. Odoo Server      - <ip_odoo_server>:10060 / <ip6_odoo_server>
# 7. AWX Server       - <ip_awx_server>:10070 / <ip6_awx_server>
# + Windows Server    - 217.156.122.248 (legacy)
#
# ┌────────────────────────────────────────────────────────────────────┐
# │ VPN-SPEZIFISCH: Alles was nur für WireGuard VPN nötig ist,       │
# │ wird unter dem Key 'vpn:' eingetragen und nur bei                │
# │ vpn_enabled: true aktiviert (Credential-Bool).                   │
# │                                                                    │
# │ VPN-Einträge umfassen:                                            │
# │  • 10.200.0.0/24       – WireGuard Subnet                       │
# │  • iifname/oifname wg0 – WireGuard Interface                    │
# │  • Port 51820          – WireGuard Listening Port                │
# │  • for: vpn:           – Forwarding für VPN-Clients             │
# │  • nat:                – Masquerading für VPN-Clients            │
# │                                                                    │
# │ VPN-ROLLEN:                                                       │
# │  • VPN-Server (Gateway): hat for/nat/port 51820                  │
# │  • VPN-Peer (Client):    nur Subnet + wg0 Interface             │
# └────────────────────────────────────────────────────────────────────┘

##########################################################################
##                                                                      ##
##   VPN SERVER – <ip_vpn_server> (WireGuard Gateway)                  ##
##                                                                      ##
##########################################################################
<ip_vpn_server>:
  in:
    global:
      ipv4:
        # Loopback & Private Ranges
        - 127.0.0.0/8 # IPv4 Loopback
        - 169.254.0.0/16 # IPv4 Link-Local
        - 10.0.0.0/8 # Private IPv4
        - 172.16.0.0/12 # Private IPv4
        - 192.168.0.0/16 # Private IPv4

        # Production Servers
        - <ip_vpn_server> # VPN Server
        - <ip_wazuh_server> # Wazuh Manager
        - <ip_mail_server> # Mail Server
        - <ip_repo_server> # Repo/Jump Server
        - <ip_ai_server> # AI Server
        - <ip_odoo_server> # Odoo Server
        - <ip_awx_server> # AWX Server

        # Legacy
        - 217.156.122.248 # Windows Server

      ipv6:
        # Loopback & Private Ranges
        - ::1 # IPv6 Loopback
        - fe80::/10 # IPv6 Link-Local
        - fc00::/7 # IPv6 Unique Local Address (ULA)

        # Production Servers
        - <ip6_vpn_server> # VPN Server
        - <ip6_wazuh_server> # Wazuh Manager
        - <ip6_mail_server> # Mail Server
        - <ip6_repo_server> # Repo/Jump Server
        - <ip6_ai_server> # AI Server
        - <ip6_odoo_server> # Odoo Server
        - <ip6_awx_server> # AWX Server

      interfaces:
        - iifname lo # Loopback-Interface

      ports: []

    debian:
      ipv4: []
      ipv6: []

    # [VPN-Server] WireGuard Gateway – nur bei vpn_enabled: true
    vpn:
      ipv4:
        - 10.200.0.0/24 # WireGuard Subnet
      ipv6: []
      interfaces:
        - iifname wg0 # WireGuard Interface
      ports:
        - 51820 # WireGuard Listening Port (UDP)

  ############################################################################
  out:
    global:
      ipv4:
        # Loopback & Private Ranges
        - 127.0.0.0/8 # IPv4 Loopback
        - 169.254.0.0/16 # IPv4 Link-Local
        - 10.0.0.0/8 # Private IPv4
        - 172.16.0.0/12 # Private IPv4
        - 192.168.0.0/16 # Private IPv4

        # Production Servers
        - <ip_vpn_server> # VPN Server
        - <ip_wazuh_server> # Wazuh Manager
        - <ip_mail_server> # Mail Server
        - <ip_repo_server> # Repo/Jump Server
        - <ip_ai_server> # AI Server
        - <ip_odoo_server> # Odoo Server
        - <ip_awx_server> # AWX Server

        # Legacy
        - 217.156.122.248 # Windows Server

      ipv6:
        # Loopback & Private Ranges
        - ::1 # IPv6 Loopback
        - fe80::/10 # IPv6 Link-Local
        - fc00::/7 # IPv6 Unique Local Address (ULA)

        # Production Servers
        - <ip6_vpn_server> # VPN Server
        - <ip6_wazuh_server> # Wazuh Manager
        - <ip6_mail_server> # Mail Server
        - <ip6_repo_server> # Repo/Jump Server
        - <ip6_ai_server> # AI Server
        - <ip6_odoo_server> # Odoo Server
        - <ip6_awx_server> # AWX Server

      interfaces:
        - oifname lo # Loopback-Interface

    debian:
      ipv4: []

      ipv6:
        # Canonical IPv6 Mirrors
        - 2620:2d:4000::/48
        - 2620:2d:4001::/48
        - 2620:2d:4002::/48

        # Loopback & Link-Local
        - ::1 # IPv6 Loopback
        - fe80::/10 # IPv6 Link-local
        - fc00::/7 # IPv6 Unique Local Address (ULA)

        # Admin/Whitelist
        - <ip6_repo_server> # Repo/Jump Server

    # [VPN-Server] WireGuard Gateway – nur bei vpn_enabled: true
    vpn:
      ipv4:
        - 10.200.0.0/24 # WireGuard Subnet
      ipv6: []
      interfaces:
        - oifname wg0 # WireGuard Interface

  ############################################################################
  # [VPN-Server] Forwarding – leitet VPN-Client-Traffic ins Internet weiter
  ############################################################################
  for:
    global:
      ipv4: []
      ipv6: []

    debian:
      ipv4: []
      ipv6: []

    # [VPN-Server] Gateway-Forwarding – nur bei vpn_enabled: true
    vpn:
      ipv4:
        - 10.200.0.0/24 # WireGuard Subnet darf forwarden
      ipv6: []
      interfaces:
        - iifname wg0 oifname eth0 # VPN-Clients ins Internet
        - iifname eth0 oifname wg0 # Antworten zurück

  ############################################################################
  # [VPN-Server] NAT – Masquerading damit VPN-Clients mit Server-IP
  # ins Internet gehen – nur bei vpn_enabled: true
  ############################################################################
  nat:
    masquerade:
      - ip saddr 10.200.0.0/24 oifname eth0 # VPN-Clients NAT

  ############################################################################
  f2b:
    ignore:
      ipv4:
        # Loopback
        - 127.0.0.0/8 # Loopback
        - 192.168.100.0/24 # Admin-VPN (legacy)

        # Production Servers
        - <ip_vpn_server> # VPN Server
        - <ip_wazuh_server> # Wazuh Manager
        - <ip_mail_server> # Mail Server
        - <ip_repo_server> # Repo/Jump Server
        - <ip_ai_server> # AI Server
        - <ip_odoo_server> # Odoo Server
        - <ip_awx_server> # AWX Server

        # Legacy
        - 217.156.122.248 # Windows Server

      ipv6:
        # Loopback & Private
        - ::1 # Loopback
        - fc00::/7 # ULA

        # Production Servers
        - <ip6_vpn_server> # VPN Server
        - <ip6_wazuh_server> # Wazuh Manager
        - <ip6_mail_server> # Mail Server
        - <ip6_repo_server> # Repo/Jump Server
        - <ip6_ai_server> # AI Server
        - <ip6_odoo_server> # Odoo Server
        - <ip6_awx_server> # AWX Server

    # [VPN-Server] Ignore VPN-Subnet – nur bei vpn_enabled: true
    vpn:
      ipv4:
        - 10.200.0.0/24 # WireGuard Subnet

